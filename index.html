// –– HELPERS ––––––––––––––––––––––––––––––––
function calcXP(score, par, holes) {
var base = holes === 9 ? 40 : 75;
var diff = score - par;
if (diff <= -5) return base + 80;
if (diff <= -2) return base + 50;
if (diff <= 0)  return base + 30;
if (diff <= 5)  return base + 15;
if (diff <= 10) return base + 5;
return base;
}

function diffStr(d) {
if (d === 0) return “E”;
return d > 0 ? “+” + d : “” + d;
}

function diffColor(d) {
if (d < 0)   return “#0B6E3F”; // under par = dark green
if (d === 0) return MG;
if (d <= 3)  return PC;
return RED;
}

function holeColor(score, par) {
if (score === null || score === undefined) return C.muted;
var d = score - par;
if (d <= -2) return “#0B6E3F”;
if (d === -1) return MG;
if (d === 0)  return “#4A8C6E”;
if (d === 1)  return PC;
return RED;
}

function holeBg(score, par) {
if (score === null || score === undefined) return C.card;
var d = score - par;
if (d <= -2) return “#D4EDDA”;
if (d === -1) return “#E8F5EE”;
if (d === 0)  return “#F0F9F4”;
if (d === 1)  return “#FFF0EB”;
return “#FFEBEB”;
}

function emptyHole(par) {
return { score: par, putts: 2, gir: false };
}

// –– COURSE MAP (OSM iframe) ————————————————
function CourseMap(props) {
var lat = props.lat;
var lng = props.lng;
var name = props.name;
if (!lat || !lng) return null;
var zoom = 15;
var src = “https://www.openstreetmap.org/export/embed.html?bbox=”
+ (lng - 0.012) + “,” + (lat - 0.008) + “,”
+ (lng + 0.012) + “,” + (lat + 0.008)
+ “&layer=mapnik&marker=” + lat + “,” + lng;
return ce(“div”, { style: { width: “100%”, height: 180, borderRadius: 12, overflow: “hidden”, border: “1px solid “ + C.cardBorder, marginTop: 12 } },
ce(“iframe”, {
src: src,
width: “100%”,
height: “180”,
frameBorder: “0”,
scrolling: “no”,
title: name + “ map”,
style: { display: “block”, pointerEvents: “none” }
})
);
}

[3, 4, 5].map(function(p) {

onClick: function() { onChange(i, p); },

color: active ? “#FFFFFF” : C.muted

}, p);
})
)

}

var activePars = pars.slice(0, holes);
var totalPar   = activePars.reduce(function(a, b) { return a + b; }, 0);

setPars(function(prev) { var n = prev.slice(); n[i] = p; return n; });
}

id: (initial && initial.id) ? initial.id : (”” + Date.now()),

function HandicapCalc(props) {
