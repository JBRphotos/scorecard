<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#006747">
  <title>Golf Tracker</title>
  <link rel="manifest" href='data:application/manifest+json,{"name":"Golf Tracker","short_name":"Golf","start_url":".","display":"standalone","background_color":"#F5F7F5","theme_color":"#006747"}'>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    body { height: 100vh; background: #F5F7F5; color: #041E0F; overflow: hidden; }
    #root { height: 100%; display: flex; flex-direction: column; max-width: 430px; margin: 0 auto; background: #F5F7F5; position: relative; }
    
    .pwa-header {
      padding-top: calc(env(safe-area-inset-top) + 20px) !important;
      background: #006747;
      color: #FFFFFF;
      padding-left: 24px;
      padding-right: 24px;
      padding-bottom: 18px;
      flex-shrink: 0;
    }

    .pwa-footer {
      padding-bottom: calc(env(safe-area-inset-bottom) + 15px) !important;
      background: #FFFFFF;
      border-top: 1px solid #D8E5DC;
      padding-left: 24px;
      padding-right: 24px;
      padding-top: 15px;
      flex-shrink: 0;
    }

    button { -webkit-tap-highlight-color: transparent; outline: none; cursor: pointer; border: none; transition: all 0.1s; }
    button:active { opacity: 0.7; transform: scale(0.98); }
    .scroll-hide::-webkit-scrollbar { display: none; }
    .card { background: #FFFFFF; border: 1px solid #D8E5DC; border-radius: 16px; padding: 16px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    (function() {
      const { useState, useEffect, useMemo } = React;
      const ce = React.createElement;

      const PALETTE = {
        bg: "#F5F7F5",
        bgAlt: "#FFFFFF",
        primary: "#006747",
        secondary: "#FBE122",
        text: "#041E0F",
        mute: "#667A6F",
        border: "#D8E5DC"
      };

      const BUILT_IN_DB = [
        { id: 'skyway', name: "Skyway Golf Course", location: "Jersey City, NJ", holes: 9, pars: [4,4,3,4,5,4,3,4,4] },
        { id: 'vancortlandt', name: "Van Cortlandt Park", location: "Bronx, NY", holes: 18, pars: [4,4,3,4,5,4,3,4,4,4,4,3,4,4,5,4,3,4] },
        { id: 'bethpage_black', name: "Bethpage Black", location: "Farmingdale, NY", holes: 18, pars: [4,3,4,5,4,4,4,3,4,4,4,4,5,4,4,4,3,4] }
      ];

      const load = (k, f) => { try { return JSON.parse(localStorage.getItem(k)) || f; } catch(e) { return f; } };
      const save = (k, v) => localStorage.setItem(k, JSON.stringify(v));

      function App() {
        const [view, setView] = useState("setup");
        const [courses, setCourses] = useState(() => load("golf_courses_v6", BUILT_IN_DB));
        const [history, setHistory] = useState(() => load("golf_history_v6", []));
        const [activeCourse, setActiveCourse] = useState(null);
        const [currentHole, setCurrentHole] = useState(0);
        const [scores, setScores] = useState([]);

        const startRound = (course) => {
          setActiveCourse(course);
          setScores(course.pars.map(p => ({ score: p, putts: 2, gir: false })));
          setCurrentHole(0);
          setView("playing");
        };

        const finishRound = () => {
          const round = {
            id: Date.now(),
            courseName: activeCourse.name,
            date: new Date().toLocaleDateString(),
            total: scores.reduce((a, b) => a + b.score, 0),
            details: scores
          };
          const newHistory = [round, ...history];
          setHistory(newHistory);
          save("golf_history_v6", newHistory);
          setView("setup");
        };

        if (view === "setup") {
          return ce("div", { style: { flex: 1, display: "flex", flexDirection: "column" } },
            ce("div", { className: "pwa-header" },
              ce("div", { style: { fontSize: 10, fontWeight: 800, letterSpacing: 1.5, opacity: 0.8, marginBottom: 4 } }, "GOLF TRACKER"),
              ce("div", { style: { fontSize: 28, fontWeight: 900 } }, "The Masters")
            ),
            ce("div", { style: { flex: 1, overflowY: "auto", padding: "20px" }, className: "scroll-hide" },
              ce("div", { style: { fontWeight: 800, fontSize: 12, color: PALETTE.mute, marginBottom: 16 } }, "SELECT COURSE"),
              courses.map(c => ce("button", {
                key: c.id,
                onClick: () => startRound(c),
                style: { width: "100%", textAlign: "left", padding: "20px", background: PALETTE.bgAlt, border: "1px solid " + PALETTE.border, borderRadius: 16, marginBottom: 12, display: "flex", justifyContent: "space-between", alignItems: "center" }
              },
                ce("div", null,
                  ce("div", { style: { fontWeight: 700, fontSize: 16, color: PALETTE.text } }, c.name),
                  ce("div", { style: { fontSize: 12, color: PALETTE.mute } }, c.location)
                ),
                ce("div", { style: { color: PALETTE.primary, fontWeight: 800, fontSize: 14 } }, c.holes + "H")
              )),
              history.length > 0 && ce("div", { style: { marginTop: 24 } },
                ce("div", { style: { fontWeight: 800, fontSize: 12, color: PALETTE.mute, marginBottom: 16 } }, "RECENT ROUNDS"),
                history.slice(0, 3).map(h => ce("div", { key: h.id, className: "card", style: { marginBottom: 8, display: "flex", justifyContent: "space-between" } },
                  ce("div", null,
                    ce("div", { style: { fontWeight: 700, fontSize: 14 } }, h.courseName),
                    ce("div", { style: { fontSize: 11, color: PALETTE.mute } }, h.date)
                  ),
                  ce("div", { style: { fontWeight: 900, fontSize: 18, color: PALETTE.primary } }, h.total)
                ))
              )
            )
          );
        }

        if (view === "playing") {
          const hole = scores[currentHole];
          const par = activeCourse.pars[currentHole];
          const totalScore = scores.reduce((a, b) => a + b.score, 0);

          return ce("div", { style: { flex: 1, display: "flex", flexDirection: "column" } },
            ce("div", { className: "pwa-header", style: { display: "flex", justifyContent: "space-between", alignItems: "flex-end" } },
              ce("div", null,
                ce("div", { style: { fontSize: 10, fontWeight: 800, opacity: 0.8 } }, activeCourse.name.toUpperCase()),
                ce("div", { style: { fontSize: 24, fontWeight: 900 } }, "Hole " + (currentHole + 1))
              ),
              ce("div", { style: { textAlign: "right" } },
                ce("div", { style: { fontSize: 10, fontWeight: 800, opacity: 0.8 } }, "TOTAL"),
                ce("div", { style: { fontSize: 24, fontWeight: 900 } }, totalScore)
              )
            ),
            ce("div", { style: { flex: 1, padding: "40px 24px", textAlign: "center", overflowY: "auto" } },
              ce("div", { style: { color: PALETTE.mute, fontWeight: 800, fontSize: 14, letterSpacing: 1 } }, "PAR " + par),
              ce("div", { style: { fontSize: 120, fontWeight: 900, color: PALETTE.text, lineHeight: 1, margin: "20px 0" } }, hole.score),
              ce("div", { style: { display: "flex", justifyContent: "center", gap: 24, marginBottom: 40 } },
                ce("button", { onClick: () => { const n = [...scores]; n[currentHole].score = Math.max(1, n[currentHole].score - 1); setScores(n); }, style: { width: 80, height: 80, borderRadius: 40, background: "#E8EBE8", fontSize: 40, color: PALETTE.primary, fontWeight: 600 } }, "−"),
                ce("button", { onClick: () => { const n = [...scores]; n[currentHole].score++; setScores(n); }, style: { width: 80, height: 80, borderRadius: 40, background: PALETTE.primary, fontSize: 40, color: "#FFFFFF", fontWeight: 600 } }, "+")
              ),
              ce("div", { className: "card", style: { display: "flex", justifyContent: "space-between", alignItems: "center", padding: "20px" } },
                ce("div", { style: { fontWeight: 800, color: PALETTE.mute, fontSize: 13 } }, "PUTTS"),
                ce("div", { style: { display: "flex", gap: 30, alignItems: "center" } },
                  ce("button", { onClick: () => { const n = [...scores]; n[currentHole].putts = Math.max(0, n[currentHole].putts - 1); setScores(n); }, style: { fontSize: 32, color: PALETTE.primary, fontWeight: 800, background: "none" } }, "−"),
                  ce("div", { style: { fontSize: 28, fontWeight: 800, minWidth: 30 } }, hole.putts),
                  ce("button", { onClick: () => { const n = [...scores]; n[currentHole].putts++; setScores(n); }, style: { fontSize: 32, color: PALETTE.primary, fontWeight: 800, background: "none" } }, "+")
                )
              )
            ),
            ce("div", { className: "pwa-footer", style: { display: "flex", gap: 12 } },
              ce("button", { 
                onClick: () => currentHole === 0 ? setView("setup") : setCurrentHole(currentHole - 1), 
                style: { flex: 1, padding: "18px", background: "#E8EBE8", color: PALETTE.mute, fontWeight: 700, borderRadius: 14 } 
              }, currentHole === 0 ? "EXIT" : "BACK"),
              ce("button", { 
                onClick: () => currentHole < activeCourse.holes - 1 ? setCurrentHole(currentHole + 1) : finishRound(),
                style: { flex: 2, padding: "18px", background: PALETTE.primary, color: "#FFFFFF", fontWeight: 800, borderRadius: 14 }
              }, currentHole < activeCourse.holes - 1 ? "NEXT HOLE" : "FINISH ROUND")
            )
          );
        }
        return null;
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(ce(App));
    })();
  </script>
</body>
</html>
