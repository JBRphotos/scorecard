<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Golf Tracker – Advanced Start</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at top, #1e293b 0, #020617 55%);
      color: #f9fafb;
    }
    .app {
      max-width: 1040px;
      margin: 0 auto;
      padding: 16px;
    }
    h1 {
      margin: 0 0 8px;
    }
    .subtitle {
      margin: 0 0 16px;
      font-size: 0.9rem;
      opacity: 0.8;
    }
    .grid {
      display: grid;
      grid-template-columns: minmax(0, 2fr) minmax(0, 1.4fr);
      gap: 12px;
    }
    @media (max-width: 800px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
    .card {
      background: rgba(15, 23, 42, 0.96);
      border-radius: 10px;
      padding: 14px 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.45);
      border: 1px solid rgba(148, 163, 184, 0.2);
      backdrop-filter: blur(10px);
      margin-bottom: 10px;
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .card-header h2 {
      margin: 0;
      font-size: 1rem;
    }
    .badge {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 999px;
      background: #0f766e;
      color: #ecfeff;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    label {
      display: block;
      font-size: 0.8rem;
      margin-bottom: 3px;
      opacity: 0.9;
    }
    select, input {
      width: 100%;
      padding: 6px 8px;
      border-radius: 6px;
      border: 1px solid #334155;
      background: #020617;
      color: #e5e7eb;
      margin-bottom: 8px;
      box-sizing: border-box;
      font-size: 0.85rem;
    }
    select:focus, input:focus {
      outline: 1px solid #22c55e;
      border-color: #22c55e;
    }
    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .row > div {
      flex: 1 1 140px;
    }
    button {
      padding: 8px 12px;
      border-radius: 999px;
      border: none;
      background: #22c55e;
      color: #022c22;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
    }
    button.secondary {
      background: #020617;
      color: #e5e7eb;
      border: 1px solid #334155;
    }
    button:disabled {
      opacity: 0.5;
      cursor: default;
    }
    .flex-between {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .small {
      font-size: 0.8rem;
      opacity: 0.8;
    }
    .pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 0.75rem;
      background: #0f766e;
      color: #ecfeff;
      margin-right: 4px;
    }
    .tag {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 999px;
      font-size: 0.7rem;
      background: #1e293b;
      color: #e5e7eb;
      margin-left: 4px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
    }
    th, td {
      border-bottom: 1px solid #1f2937;
      padding: 4px 6px;
      text-align: center;
    }
    th {
      background: #020617;
      position: sticky;
      top: 0;
      z-index: 1;
    }
    .scroll-x {
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>Golf Tracker</h1>
    <p class="subtitle">Log every round, track handicap from your last 5, and play with Scramble & Wolf variants.</p>
    <div id="root"></div>
  </div>

  <script>
    // ---------- Storage & Handicap ----------
    function loadRounds() {
      try {
        const raw = localStorage.getItem("golf_rounds_v2");
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [];
      } catch (e) {
        console.error("Failed to load rounds", e);
        return [];
      }
    }

    function saveRounds(rounds) {
      try {
        localStorage.setItem("golf_rounds_v2", JSON.stringify(rounds));
      } catch (e) {
        console.error("Failed to save rounds", e);
      }
    }

    function calculateHandicapFromRounds(rounds) {
      if (!rounds.length) return null;
      const recent = [...rounds].sort((a, b) => b.date - a.date).slice(0, 5);
      const diffs = recent
        .filter(r => typeof r.totalScore === "number" && typeof r.coursePar === "number")
        .map(r => r.totalScore - r.coursePar);
      if (!diffs.length) return null;
      const avg = diffs.reduce((a, b) => a + b, 0) / diffs.length;
      return Math.round(avg * 10) / 10;
    }

    function formatDate(ts) {
      const d = new Date(ts);
      return d.toLocaleDateString();
    }

    // ---------- State ----------
    const state = {
      rounds: loadRounds(),
      view: "setup", // setup | play | history
      currentRound: null,
    };

    function setState(patch) {
      Object.assign(state, patch);
      render();
    }

    // ---------- Setup View ----------
    function SetupView() {
      const container = document.createElement("div");
      const grid = document.createElement("div");
      grid.className = "grid";

      // Left: Start Round
      const leftCard = document.createElement("div");
      leftCard.className = "card";

      const header = document.createElement("div");
      header.className = "card-header";
      const h2 = document.createElement("h2");
      h2.textContent = "New Round";
      const badge = document.createElement("span");
      badge.className = "badge";
      badge.textContent = "Setup";
      header.appendChild(h2);
      header.appendChild(badge);
      leftCard.appendChild(header);

      const form = document.createElement("div");

      // Game mode
      const modeRow = document.createElement("div");
      modeRow.className = "row";

      const modeCol = document.createElement("div");
      const modeLabel = document.createElement("label");
      modeLabel.textContent = "Game mode";
      const modeSelect = document.createElement("select");
      ["Stroke Play", "Match Play", "Scramble", "Wolf"].forEach(m => {
        const opt = document.createElement("option");
        opt.value = m;
        opt.textContent = m;
        modeSelect.appendChild(opt);
      });
      modeCol.appendChild(modeLabel);
      modeCol.appendChild(modeSelect);
      modeRow.appendChild(modeCol);

      const parCol = document.createElement("div");
      const parLabel = document.createElement("label");
      parLabel.textContent = "Course par";
      const parInput = document.createElement("input");
      parInput.type = "number";
      parInput.min = "60";
      parInput.max = "80";
      parInput.value = "72";
      parCol.appendChild(parLabel);
      parCol.appendChild(parInput);
      modeRow.appendChild(parCol);

      form.appendChild(modeRow);

      // Variant row
      const variantRow = document.createElement("div");
      variantRow.className = "row";

      const scrambleCol = document.createElement("div");
      const scrambleLabel = document.createElement("label");
      scrambleLabel.textContent = "Scramble variant";
      const scrambleSelect = document.createElement("select");
      ["2-Player Scramble", "4-Player Scramble", "Solo Scramble", "Texas Scramble", "Florida Scramble"].forEach(v => {
        const opt = document.createElement("option");
        opt.value = v;
        opt.textContent = v;
        scrambleSelect.appendChild(opt);
      });
      scrambleCol.appendChild(scrambleLabel);
      scrambleCol.appendChild(scrambleSelect);

      const wolfCol = document.createElement("div");
      const wolfLabel = document.createElement("label");
      wolfLabel.textContent = "Wolf variant";
      const wolfSelect = document.createElement("select");
      ["Classic Wolf", "Hammer Wolf", "Blind Wolf", "Simplified Wolf", "Progressive Wolf"].forEach(v => {
        const opt = document.createElement("option");
        opt.value = v;
        opt.textContent = v;
        wolfSelect.appendChild(opt);
      });
      wolfCol.appendChild(wolfLabel);
      wolfCol.appendChild(wolfSelect);

      variantRow.appendChild(scrambleCol);
      variantRow.appendChild(wolfCol);
      form.appendChild(variantRow);

      // Players & notes
      const playersRow = document.createElement("div");
      playersRow.className = "row";

      const playersCol = document.createElement("div");
      const playersLabel = document.createElement("label");
      playersLabel.textContent = "Players (comma separated)";
      const playersInput = document.createElement("input");
      playersInput.type = "text";
      playersInput.placeholder = "e.g. Jesse, Pat, Sam, Riley";
      playersCol.appendChild(playersLabel);
      playersCol.appendChild(playersInput);

      const notesCol = document.createElement("div");
      const notesLabel = document.createElement("label");
      notesLabel.textContent = "Course / notes";
      const notesInput = document.createElement("input");
      notesInput.type = "text";
      notesInput.placeholder = "Course name, tees, conditions...";
      notesCol.appendChild(notesLabel);
      notesCol.appendChild(notesInput);

      playersRow.appendChild(playersCol);
      playersRow.appendChild(notesCol);
      form.appendChild(playersRow);

      leftCard.appendChild(form);

      const actions = document.createElement("div");
      actions.className = "flex-between";

      const leftActions = document.createElement("div");
      const startBtn = document.createElement("button");
      startBtn.textContent = "Start Round";
      startBtn.onclick = () => {
        const mode = modeSelect.value;
        const scrambleVariant = scrambleSelect.value;
        const wolfVariant = wolfSelect.value;
        const par = parseInt(parInput.value, 10) || 72;
        const playersRaw = playersInput.value.trim();
        const players = playersRaw
          ? playersRaw.split(",").map(p => p.trim()).filter(Boolean)
          : ["Player 1"];

        if (mode === "Wolf" && players.length !== 4) {
          alert("Wolf requires exactly 4 players.");
          return;
        }

        const round = {
          id: Date.now(),
          date: Date.now(),
          mode,
          scrambleVariant: mode === "Scramble" ? scrambleVariant : null,
          wolfVariant: mode === "Wolf" ? wolfVariant : null,
          players,
          scores: {},
          coursePar: par,
          notes: notesInput.value.trim() || "",
          totalScore: null,
        };

        players.forEach(p => {
          round.scores[p] = Array(18).fill(null);
        });

        setState({ currentRound: round, view: "play" });
      };
      leftActions.appendChild(startBtn);

      const rightActions = document.createElement("div");
      const historyBtn = document.createElement("button");
      historyBtn.className = "secondary";
      historyBtn.textContent = "View History";
      historyBtn.onclick = () => setState({ view: "history" });
      rightActions.appendChild(historyBtn);

      actions.appendChild(leftActions);
      actions.appendChild(rightActions);
      leftCard.appendChild(actions);

      // Right: Handicap & recent
      const rightCard = document.createElement("div");
      rightCard.className = "card";

      const rHeader = document.createElement("div");
      rHeader.className = "card-header";
      const rTitle = document.createElement("h2");
      rTitle.textContent = "Handicap & Recent Rounds";
      const rBadge = document.createElement("span");
      rBadge.className = "badge";
      rBadge.textContent = "Overview";
      rHeader.appendChild(rTitle);
      rHeader.appendChild(rBadge);
      rightCard.appendChild(rHeader);

      const handicap = calculateHandicapFromRounds(state.rounds);
      const p = document.createElement("p");
      if (handicap === null) {
        p.textContent = "Not enough data yet. Play some rounds to establish a handicap.";
      } else {
        p.innerHTML = `Current handicap (last 5 rounds): <span class="pill">${handicap >= 0 ? "+" + handicap : handicap}</span>`;
      }
      rightCard.appendChild(p);

      const recent = [...state.rounds].sort((a, b) => b.date - a.date).slice(0, 5);
      if (recent.length) {
        const list = document.createElement("div");
        recent.forEach(r => {
          const row = document.createElement("div");
          row.className = "small";
          const diff = typeof r.totalScore === "number" && typeof r.coursePar === "number"
            ? r.totalScore - r.coursePar
            : null;
          row.textContent = `${formatDate(r.date)} – ${r.mode}`;
          if (r.scrambleVariant) row.textContent += ` (${r.scrambleVariant})`;
          if (r.wolfVariant) row.textContent += ` (${r.wolfVariant})`;
          if (diff !== null) {
            const span = document.createElement("span");
            span.className = "tag";
            span.textContent = diff >= 0 ? `+${diff}` : diff;
            row.appendChild(span);
          }
          list.appendChild(row);
        });
        rightCard.appendChild(list);
      } else {
        const none = document.createElement("p");
        none.className = "small";
        none.textContent = "No rounds logged yet.";
        rightCard.appendChild(none);
      }

      grid.appendChild(leftCard);
      grid.appendChild(rightCard);
      container.appendChild(grid);

      return container;
    }

    // ---------- Play View ----------
    function PlayView() {
      const round = state.currentRound;
      if (!round) {
        const div = document.createElement("div");
        div.textContent = "No active round.";
        return div;
      }

      const container = document.createElement("div");
      const card = document.createElement("div");
      card.className = "card";

      const header = document.createElement("div");
      header.className = "flex-between";

      const left = document.createElement("div");
      const title = document.createElement("h2");
      title.textContent = "Round in Progress";
      left.appendChild(title);

      const meta = document.createElement("div");
      meta.className = "small";
      meta.textContent = `${round.mode}`;
      if (round.scrambleVariant) meta.textContent += ` • ${round.scrambleVariant}`;
      if (round.wolfVariant) meta.textContent += ` • ${round.wolfVariant}`;
      if (round.notes) meta.textContent += ` • ${round.notes}`;
      left.appendChild(meta);

      const right = document.createElement("div");
      const backBtn = document.createElement("button");
      backBtn.className = "secondary";
      backBtn.textContent = "Back to Setup";
      backBtn.onclick = () => setState({ view: "setup", currentRound: null });
      right.appendChild(backBtn);

      header.appendChild(left);
      header.appendChild(right);
      card.appendChild(header);

      const tableWrap = document.createElement("div");
      tableWrap.className = "scroll-x";
      const table = document.createElement("table");
      const thead = document.createElement("thead");
      const trHead = document.createElement("tr");

      const thHole = document.createElement("th");
      thHole.textContent = "Hole";
      trHead.appendChild(thHole);

      round.players.forEach(p => {
        const th = document.createElement("th");
        th.textContent = p;
        trHead.appendChild(th);
      });

      thead.appendChild(trHead);
      table.appendChild(thead);

      const tbody = document.createElement("tbody");
      for (let i = 0; i < 18; i++) {
        const tr = document.createElement("tr");
        const tdHole = document.createElement("td");
        tdHole.textContent = i + 1;
        tr.appendChild(tdHole);

        round.players.forEach(p => {
          const td = document.createElement("td");
          const input = document.createElement("input");
          input.type = "number";
          input.min = "1";
          input.max = "15";
          input.style.width = "60px";
          const val = round.scores[p][i];
          input.value = val == null ? "" : val;
          input.onchange = () => {
            const v = input.value.trim();
            round.scores[p][i] = v === "" ? null : parseInt(v, 10);
          };
          td.appendChild(input);
          tr.appendChild(td);
        });

        tbody.appendChild(tr);
      }

      table.appendChild(tbody);
      tableWrap.appendChild(table);
      card.appendChild(tableWrap);

      const footer = document.createElement("div");
      footer.className = "flex-between";

      const leftF = document.createElement("div");
      const finishBtn = document.createElement("button");
      finishBtn.textContent = "Finish Round";
      finishBtn.onclick = () => {
        const primary = round.players[0];
        const arr = round.scores[primary] || [];
        const valid = arr.filter(v => typeof v === "number");
        if (!valid.length) {
          if (!confirm("No scores entered. Save round anyway?")) return;
        }
        const total = valid.reduce((a, b) => a + b, 0);
        round.totalScore = valid.length ? total : null;

        const updated = [...state.rounds, round];
        saveRounds(updated);
        setState({ rounds: updated, currentRound: null, view: "history" });
      };
      leftF.appendChild(finishBtn);

      const rightF = document.createElement("div");
      const cancelBtn = document.createElement("button");
      cancelBtn.className = "secondary";
      cancelBtn.textContent = "Cancel Round";
      cancelBtn.onclick = () => {
        if (confirm("Discard this round?")) {
          setState({ currentRound: null, view: "setup" });
        }
      };
      rightF.appendChild(cancelBtn);

      footer.appendChild(leftF);
      footer.appendChild(rightF);
      card.appendChild(footer);

      container.appendChild(card);
      return container;
    }

    // ---------- History View ----------
    function HistoryView() {
      const container = document.createElement("div");
      const card = document.createElement("div");
      card.className = "card";

      const header = document.createElement("div");
      header.className = "flex-between";

      const left = document.createElement("div");
      const h2 = document.createElement("h2");
      h2.textContent = "Round History";
      left.appendChild(h2);

      const right = document.createElement("div");
      const backBtn = document.createElement("button");
      backBtn.className = "secondary";
      backBtn.textContent = "Back";
      backBtn.onclick = () => setState({ view: "setup" });
      right.appendChild(backBtn);

      header.appendChild(left);
      header.appendChild(right);
      card.appendChild(header);

      if (!state.rounds.length) {
        const p = document.createElement("p");
        p.textContent = "No rounds logged yet.";
        card.appendChild(p);
        container.appendChild(card);
        return container;
      }

      const tableWrap = document.createElement("div");
      tableWrap.className = "scroll-x";
      const table = document.createElement("table");
      const thead = document.createElement("thead");
      const trHead = document.createElement("tr");
      ["Date", "Mode", "Variant", "Players", "Score", "Par", "Diff"].forEach(h => {
        const th = document.createElement("th");
        th.textContent = h;
        trHead.appendChild(th);
      });
      thead.appendChild(trHead);
      table.appendChild(thead);

      const tbody = document.createElement("tbody");
      const sorted = [...state.rounds].sort((a, b) => b.date - a.date);
      sorted.forEach(r => {
        const tr = document.createElement("tr");
        const diff = typeof r.totalScore === "number" && typeof r.coursePar === "number"
          ? r.totalScore - r.coursePar
          : null;
        const variant = r.scrambleVariant || r.wolfVariant || "";

        const cols = [
          formatDate(r.date),
          r.mode,
          variant,
          r.players.join(", "),
          r.totalScore == null ? "-" : r.totalScore,
          r.coursePar ?? "-",
          diff == null ? "-" : (diff >= 0 ? "+" + diff : diff),
        ];

        cols.forEach(c => {
          const td = document.createElement("td");
          td.textContent = c;
          tr.appendChild(td);
        });

        tbody.appendChild(tr);
      });

      table.appendChild(tbody);
      tableWrap.appendChild(table);
      card.appendChild(tableWrap);

      container.appendChild(card);
      return container;
    }

    // ---------- Root Render ----------
    function render() {
      const root = document.getElementById("root");
      root.innerHTML = "";

      let node;
      if (state.view === "setup") {
        node = SetupView();
      } else if (state.view === "play") {
        node = PlayView();
      } else if (state.view === "history") {
        node = HistoryView();
      } else {
        node = document.createElement("div");
        node.textContent = "Unknown view.";
      }

      root.appendChild(node);
    }

    render();
  </script>
</body>
</html>
