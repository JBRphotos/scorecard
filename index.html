<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Golf Tracker</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; }
    body { height: 100vh; background: #F5F7F5; color: #041E0F; overflow: hidden; display: flex; flex-direction: column; }
    #root { height: 100%; display: flex; flex-direction: column; max-width: 430px; margin: 0 auto; width: 100%; position: relative; background: #F5F7F5; }
    
    /* PWA & Safari Notch/Home Bar Fixes */
    .pwa-header { padding-top: env(safe-area-inset-top); background: #006747; color: #FFF; flex-shrink: 0; }
    .pwa-footer { padding-bottom: env(safe-area-inset-bottom); background: #FFF; border-top: 1px solid #D8E5DC; flex-shrink: 0; }
    .scroll-container { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 20px; }
    
    button { cursor: pointer; border: none; transition: all 0.1s; -webkit-tap-highlight-color: transparent; border-radius: 12px; }
    button:active { opacity: 0.7; transform: scale(0.98); }
    .card { background: #FFFFFF; border: 1px solid #D8E5DC; border-radius: 16px; padding: 16px; margin-bottom: 12px; }
    .grid-btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px; }
  </style>
</head>
<body>
<div id="root"></div>
<script>
window.onload = function() {
  const { useState, useEffect } = React;
  const ce = React.createElement;

  [span_4](start_span)// REINSTATED FULL PALETTE[span_4](end_span)
  const PALETTE = { bg: "#F5F7F5", primary: "#006747", yellow: "#FBE122", text: "#041E0F", mute: "#667A6F", border: "#D8E5DC", btn: "#EEF4F0" };

  [span_5](start_span)// REINSTATED FULL DATABASE[span_5](end_span)
  const COURSE_DB = [
    { id: 'nyc_van_cortlandt', name: "Van Cortlandt Park", location: "Bronx, NY", holes: 18, pars: [4,4,3,4,5,4,3,4,4,4,4,3,4,4,5,4,3,4] },
    { id: 'j_skyway', name: "Skyway Golf Course", location: "Jersey City, NJ", holes: 9, pars: [4,4,3,4,5,4,3,4,4] },
    { id: 'bethpage_black', name: "Bethpage Black", location: "Farmingdale, NY", holes: 18, pars: [4,3,4,5,4,4,4,3,4,4,4,4,5,4,4,4,3,4] },
    { id: 'hackensack_c', name: "Hackensack Golf Club", location: "Emerson, NJ", holes: 18, pars: Array(18).fill(4) }
  ];

  [span_6](start_span)// REINSTATED PAR ROW COMPONENT[span_6](end_span)
  function ParRow({ index, par, onChange }) {
    return ce("div", { style: { display: "flex", alignItems: "center", gap: 12, marginBottom: 8 } },
      ce("div", { style: { width: 60, fontWeight: 800, fontSize: 12, color: PALETTE.mute } }, "HOLE " + (index + 1)),
      ce("div", { style: { flex: 1, display: "flex", gap: 8 } },
        [3, 4, 5].map(p => ce("button", {
          key: p, onClick: () => onChange(index, p),
          style: { flex: 1, padding: "10px", borderRadius: 8, background: par === p ? PALETTE.primary : PALETTE.btn, color: par === p ? "#FFF" : PALETTE.text, fontWeight: 700 }
        }, p))
      )
    );
  }

  function App() {
    const [view, setView] = useState("setup");
    const [gameMode, setGameMode] = useState("Stroke");
    const [numHoles, setNumHoles] = useState(18);
    const [customPars, setCustomPars] = useState(Array(18).fill(4));
    const [activeCourse, setActiveCourse] = useState(null);
    const [currentHole, setCurrentHole] = useState(0);
    const [scores, setScores] = useState([]);

    [span_7](start_span)// REINSTATED GAME MODES[span_7](end_span)
    const modes = [
      { id: "Stroke", label: "Stroke Play", desc: "Standard scoring" },
      { id: "Match", label: "Match Play", desc: "Hole-by-hole" },
      { id: "Skins", label: "Skins", desc: "Carry over points" },
      { id: "Wolf", label: "Wolf", desc: "1 vs 3 rotation" },
      { id: "Stableford", label: "Stableford", desc: "Points based" },
      { id: "Scramble", label: "Scramble", desc: "Team play" }
    ];

    function startRound(course) {
      setActiveCourse(course);
      setScores(course.pars.map(p => ({ score: p, putts: 2, gir: false, skins: 0, points: 0 })));
      setCurrentHole(0);
      setView("playing");
    }

    if (view === "setup") {
      return ce("div", { style: { flex: 1, display: "flex", flexDirection: "column" } },
        ce("div", { className: "pwa-header" },
          ce("div", { style: { padding: "20px 24px" } },
            ce("div", { style: { fontSize: 10, fontWeight: 800, opacity: 0.8, letterSpacing: "0.1em" } }, "GOLF TRACKER"),
            ce("div", { style: { fontSize: 28, fontWeight: 900 } }, "Pre-Round Setup")
          )
        ),
        ce("div", { className: "scroll-container" },
          ce("div", { style: { fontWeight: 800, fontSize: 12, color: PALETTE.mute, marginBottom: 10 } }, "GAME MODE"),
          ce("div", { className: "grid-btns" },
            modes.map(m => ce("button", {
              key: m.id, onClick: () => setGameMode(m.id),
              style: { padding: "12px 4px", fontSize: 11, background: gameMode === m.id ? PALETTE.primary : PALETTE.btn, color: gameMode === m.id ? "#FFF" : PALETTE.text, fontWeight: 700 }
            }, m.id))
          ),
          ce("div", { style: { fontWeight: 800, fontSize: 12, color: PALETTE.mute, marginBottom: 10 } }, "QUICK START"),
          COURSE_DB.map(c => ce("button", {
            key: c.id, onClick: () => startRound(c),
            style: { width: "100%", textAlign: "left", padding: "16px", background: "#FFF", border: "1px solid " + PALETTE.border, borderRadius: 16, marginBottom: 10, display: "flex", justifyContent: "space-between", alignItems: "center" }
          }, 
            ce("div", null, ce("div", { style: { fontWeight: 700 } }, c.name), ce("div", { style: { fontSize: 12, color: PALETTE.mute } }, c.location)),
            ce("div", { style: { fontWeight: 800, color: PALETTE.primary } }, c.holes + "H")
          )),
          ce("div", { style: { marginTop: 20, fontWeight: 800, fontSize: 12, color: PALETTE.mute, marginBottom: 10 } }, "PAR PICKER (CUSTOM)"),
          ce("div", { style: { display: "flex", gap: 8, marginBottom: 15 } },
            [9, 18].map(h => ce("button", {
              key: h, onClick: () => { setNumHoles(h); setCustomPars(Array(h).fill(4)); },
              style: { flex: 1, padding: "12px", background: numHoles === h ? PALETTE.primary : PALETTE.btn, color: numHoles === h ? "#FFF" : PALETTE.text, fontWeight: 700 }
            }, h + " Holes"))
          ),
          customPars.map((p, i) => ce(ParRow, {
            key: i, index: i, par: p,
            onChange: (idx, val) => { const n = [...customPars]; n[idx] = val; setCustomPars(n); }
          })),
          ce("button", {
            onClick: () => startRound({ name: "Custom Round", pars: customPars, holes: numHoles, location: "Local" }),
            style: { width: "100%", padding: "20px", background: PALETTE.primary, color: "#FFF", fontWeight: 800, fontSize: 16, marginTop: 20, marginBottom: 40 }
          }, "START CUSTOM ROUND")
        )
      );
    }

    if (view === "playing") {
      const hole = scores[currentHole];
      const par = activeCourse.pars[currentHole];
      return ce("div", { style: { flex: 1, display: "flex", flexDirection: "column" } },
        ce("div", { className: "pwa-header" },
          ce("div", { style: { padding: "15px 20px", display: "flex", justifyContent: "space-between", alignItems: "center" } },
            ce("div", null, ce("div", { style: { fontSize: 10, fontWeight: 800, opacity: 0.8 } }, activeCourse.name.toUpperCase()), ce("div", { style: { fontSize: 24, fontWeight: 900 } }, "Hole " + (currentHole + 1))),
            ce("div", { style: { textAlign: "right" } }, ce("div", { style: { fontSize: 10, fontWeight: 800, opacity: 0.8 } }, gameMode.toUpperCase()), ce("div", { style: { fontSize: 24, fontWeight: 900 } }, "Par " + par))
          )
        ),
        ce("div", { className: "scroll-container", style: { textAlign: "center" } },
          ce("div", { style: { fontSize: 120, fontWeight: 900, color: PALETTE.text, lineHeight: 1, margin: "20px 0" } }, hole.score),
          ce("div", { style: { display: "flex", justifyContent: "center", gap: 30, marginBottom: 40 } },
            ce("button", { onClick: () => { const n = [...scores]; n[currentHole].score = Math.max(1, n[currentHole].score - 1); setScores(n); }, style: { width: 80, height: 80, borderRadius: 40, background: PALETTE.btn, fontSize: 40, color: PALETTE.primary } }, "−"),
            ce("button", { onClick: () => { const n = [...scores]; n[currentHole].score++; setScores(n); }, style: { width: 80, height: 80, borderRadius: 40, background: PALETTE.primary, fontSize: 40, color: "#FFF" } }, "+")
          ),
          ce("div", { className: "card", style: { display: "flex", justifyContent: "space-between", alignItems: "center" } },
            ce("div", { style: { fontWeight: 800, color: PALETTE.mute, fontSize: 13 } }, "PUTTS"),
            ce("div", { style: { display: "flex", gap: 24, alignItems: "center" } },
              ce("button", { onClick: () => { const n = [...scores]; n[currentHole].putts = Math.max(0, n[currentHole].putts - 1); setScores(n); }, style: { fontSize: 30, color: PALETTE.primary } }, "−"),
              ce("div", { style: { fontSize: 24, fontWeight: 800 } }, hole.putts),
              ce("button", { onClick: () => { const n = [...scores]; n[currentHole].putts++; setScores(n); }, style: { fontSize: 30, color: PALETTE.primary } }, "+")
            )
          ),
          ce("button", { 
            onClick: () => { const n = [...scores]; n[currentHole].gir = !n[currentHole].gir; setScores(n); },
            style: { width: "100%", padding: "16px", borderRadius: 16, background: hole.gir ? "#E8F5EE" : "#FFF", border: hole.gir ? "2px solid " + PALETTE.primary : "1px solid " + PALETTE.border, color: PALETTE.primary, fontWeight: 800 }
          }, hole.gir ? "✓ GREEN IN REGULATION" : "MISSED THE GREEN?")
        ),
        ce("div", { className: "pwa-footer" },
          ce("div", { style: { display: "flex", gap: 12, padding: "15px 24px" } },
            ce("button", { onClick: () => currentHole === 0 ? setView("setup") : setCurrentHole(currentHole - 1), style: { flex: 1, padding: "18px", background: PALETTE.btn, color: PALETTE.mute, fontWeight: 700 } }, "BACK"),
            ce("button", { 
              onClick: () => currentHole < activeCourse.holes - 1 ? setCurrentHole(currentHole + 1) : setView("setup"),
              style: { flex: 2, padding: "18px", background: PALETTE.primary, color: "#FFF", fontWeight: 800 }
            }, currentHole < activeCourse.holes - 1 ? "NEXT HOLE" : "FINISH")
          )
        )
      );
    }
  }

  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(ce(App));
};
</script>
</body>
</html>
