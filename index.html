<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Masters Tracker Pro</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    body { background-color: #FFFFFF; color: #041E0F; height: 100vh; overflow: hidden; }
    #root { height: 100%; display: flex; flex-direction: column; max-width: 450px; margin: 0 auto; background: #FFFFFF; border-left: 1px solid #E0E5E2; border-right: 1px solid #E0E5E2; }
    button { cursor: pointer; border: none; transition: all 0.1s; -webkit-tap-highlight-color: transparent; border-radius: 12px; }
    button:active { transform: scale(0.98); opacity: 0.8; }
    input { outline: none; border: none; font-size: 16px; }
    .card { background: #F8F9F8; border: 1px solid #E0E5E2; border-radius: 16px; padding: 16px; margin-bottom: 12px; }
  </style>
</head>
<body>
<div id="root"></div>
<script>
const { useState, useEffect } = React;
const ce = React.createElement;

const COLORS = {
  green: "#006747",  // Augusta Green
  yellow: "#FBE122", // Masters Yellow
  pimento: "#FF6B35",// Orange-Red
  text: "#041E0F",   // Deep Forest
  muted: "#667A6F",  // Gray-Green
  border: "#E0E5E2", 
  white: "#FFFFFF"
};

// Built-in Database Fixes
const BUILT_IN_DB = [
  { id: 'skyway', name: "Skyway Golf Course", location: "Jersey City, NJ", holes: 9, pars: [4,4,3,4,5,4,3,4,4] },
  { id: 'hackensack', name: "Hackensack Golf Club", location: "Emerson, NJ", holes: 18, pars: Array(18).fill(4) }
];

const save = (k, v) => localStorage.setItem(k, JSON.stringify(v));
const load = (k, f) => { try { return JSON.parse(localStorage.getItem(k)) || f; } catch(e) { return f; } };

function App() {
  const [view, setView] = useState("setup");
  const [courses, setCourses] = useState(() => load("golf_courses_v5", BUILT_IN_DB));
  const [history, setHistory] = useState(() => load("golf_history_v5", []));
  
  // FIXED: Variable initialization to prevent ReferenceError
  const [homeCourse, setHomeCourse] = useState(() => load("golf_home_course", null));
  
  const [searchQuery, setSearchQuery] = useState("");
  const [searchResults, setSearchResults] = useState([]);
  const [isSearching, setIsSearching] = useState(false);

  // Active Round
  const [activeCourse, setActiveCourse] = useState(null);
  const [currentHole, setCurrentHole] = useState(0);
  const [scores, setScores] = useState([]);

  async function handleSearch() {
    if (!searchQuery) return;
    setIsSearching(true);
    try {
      const resp = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(searchQuery)}+golf+course&format=json&limit=5`);
      const data = await resp.json();
      setSearchResults(data);
    } catch (e) { console.error(e); }
    setIsSearching(false);
  }

  function startRound(course) {
    setActiveCourse(course);
    setScores(course.pars.map(p => ({ score: p, putts: 2 })));
    setCurrentHole(0);
    setView("playing");
  }

  const Header = (title, sub) => ce("div", { style: { padding: "30px 24px", background: COLORS.green, color: COLORS.white } },
    ce("div", { style: { fontSize: 10, fontWeight: 700, letterSpacing: 1.5, opacity: 0.8, marginBottom: 4 } }, sub.toUpperCase()),
    ce("div", { style: { fontSize: 28, fontWeight: 900 } }, title)
  );

  if (view === "setup") {
    return ce("div", { style: { flex: 1, display: "flex", flexDirection: "column" } },
      Header("The Masters", "Golf Tracker"),
      ce("div", { style: { padding: "24px", flex: 1, overflowY: "auto" } },
        ce("div", { style: { display: "flex", gap: 8, marginBottom: 24 } },
          ce("input", { 
            placeholder: "Find a course...", value: searchQuery, 
            onChange: e => setSearchQuery(e.target.value),
            style: { flex: 1, padding: "16px", borderRadius: 12, background: "#F0F2F0", color: COLORS.text }
          }),
          ce("button", { onClick: handleSearch, style: { background: COLORS.green, color: "#FFF", padding: "0 20px", fontWeight: 700 } }, "GO")
        ),
        
        isSearching && ce("div", { style: { textAlign: "center", color: COLORS.muted, marginBottom: 12 } }, "Searching..."),

        searchResults.map(r => ce("button", { 
          key: r.place_id, 
          onClick: () => {
            const nc = { id: Date.now(), name: r.display_name.split(',')[0], holes: 18, pars: Array(18).fill(4) };
            startRound(nc);
          },
          style: { width: "100%", textAlign: "left", padding: "16px", background: "#F8F9F8", border: "1px solid " + COLORS.border, marginBottom: 8 }
        }, r.display_name.split(',').slice(0,2).join(','))),

        ce("div", { style: { marginTop: 12, fontWeight: 800, fontSize: 12, color: COLORS.muted, marginBottom: 12 } }, "SAVED COURSES"),
        courses.map(c => ce("button", { 
          key: c.id, 
          onClick: () => startRound(c),
          style: { width: "100%", textAlign: "left", padding: "18px", background: COLORS.white, border: "1px solid " + COLORS.border, marginBottom: 10, display: "flex", justifyContent: "space-between" }
        }, ce("span", { style: { fontWeight: 600 } }, c.name), ce("span", { style: { color: COLORS.green, fontWeight: 700 } }, c.holes + "H")))
      )
    );
  }

  if (view === "playing") {
    const hole = scores[currentHole];
    const par = activeCourse.pars[currentHole];
    return ce("div", { style: { flex: 1, display: "flex", flexDirection: "column" } },
      ce("div", { style: { padding: "20px", background: COLORS.green, color: "#FFF", display: "flex", justifyContent: "space-between" } },
        ce("div", null, ce("div", { style: { fontSize: 10, fontWeight: 700, opacity: 0.8 } }, activeCourse.name.toUpperCase()), ce("div", { style: { fontSize: 22, fontWeight: 800 } }, "Hole " + (currentHole + 1))),
        ce("button", { onClick: () => setView("setup"), style: { color: COLORS.yellow, fontWeight: 700 } }, "EXIT")
      ),
      ce("div", { style: { flex: 1, padding: "40px 24px", textAlign: "center" } },
        ce("div", { style: { color: COLORS.muted, fontWeight: 700 } }, "PAR " + par),
        ce("div", { style: { fontSize: 120, fontWeight: 900, color: COLORS.text, margin: "10px 0" } }, hole.score),
        ce("div", { style: { display: "flex", justifyContent: "center", gap: 30, marginBottom: 40 } },
          ce("button", { onClick: () => { const n = [...scores]; n[currentHole].score--; setScores(n); }, style: { width: 70, height: 70, borderRadius: 35, background: "#F0F2F0", fontSize: 32, color: COLORS.green } }, "−"),
          ce("button", { onClick: () => { const n = [...scores]; n[currentHole].score++; setScores(n); }, style: { width: 70, height: 70, borderRadius: 35, background: COLORS.green, fontSize: 32, color: "#FFF" } }, "+")
        ),
        ce("div", { className: "card", style: { display: "flex", justifyContent: "space-between", alignItems: "center" } },
          ce("div", { style: { fontWeight: 700, color: COLORS.muted } }, "PUTTS"),
          ce("div", { style: { display: "flex", gap: 20, alignItems: "center" } },
            ce("button", { onClick: () => { const n = [...scores]; n[currentHole].putts--; setScores(n); }, style: { fontSize: 24, color: COLORS.green, fontWeight: 800 } }, "−"),
            ce("div", { style: { fontSize: 24, fontWeight: 800 } }, hole.putts),
            ce("button", { onClick: () => { const n = [...scores]; n[currentHole].putts++; setScores(n); }, style: { fontSize: 24, color: COLORS.green, fontWeight: 800 } }, "+")
          )
        )
      ),
      ce("div", { style: { padding: "24px", display: "flex", gap: 12 } },
        ce("button", { onClick: () => setCurrentHole(Math.max(0, currentHole - 1)), style: { flex: 1, padding: "18px", background: "#F0F2F0", color: COLORS.muted, fontWeight: 700 } }, "BACK"),
        ce("button", { 
          onClick: () => {
            if (currentHole < activeCourse.holes - 1) setCurrentHole(currentHole + 1);
            else setView("setup");
          },
          style: { flex: 2, padding: "18px", background: COLORS.green, color: "#FFF", fontWeight: 800 }
        }, currentHole < activeCourse.holes - 1 ? "NEXT HOLE" : "FINISH")
      )
    );
  }

  return ce("div", null, "Loading...");
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(ce(App));
</script>
</body>
</html>
