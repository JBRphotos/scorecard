      #root { position: fixed; top: 0; left: 0; right: 0; bottom: 0; overflow: hidden; display: flex; flex-direction: column; }
    }
    @media not all and (display-mode: standalone) {

// ---- HELPERS ----------------------------------------------------------------
function calcXP(score, par, holes) {
  var base = holes === 9 ? 40 : 75;
  var diff = score - par;
  if (diff <= -5) return base + 80;
  if (diff <= -2) return base + 50;
  if (diff <= 0)  return base + 30;
  if (diff <= 5)  return base + 15;
  if (diff <= 10) return base + 5;
  return base;
}

function diffStr(d) {
  if (d === 0) return "E";
  return d > 0 ? "+" + d : "" + d;
}

function diffColor(d) {
  if (d < 0)   return "#0B6E3F"; // under par = dark green
  if (d === 0) return MG;
  if (d <= 3)  return PC;
  return RED;
}

function holeColor(score, par) {
  if (score === null || score === undefined) return C.muted;
  var d = score - par;
  if (d <= -2) return "#0B6E3F";
  if (d === -1) return MG;
  if (d === 0)  return "#4A8C6E";
  if (d === 1)  return PC;
  return RED;
}

function holeBg(score, par) {
  if (score === null || score === undefined) return C.card;
  var d = score - par;
  if (d <= -2) return "#D4EDDA";
  if (d === -1) return "#E8F5EE";
  if (d === 0)  return "#F0F9F4";
  if (d === 1)  return "#FFF0EB";
  return "#FFEBEB";
}

function emptyHole(par) {
  return { score: par, putts: 2, gir: false };
}

// ---- COURSE MAP (OSM iframe) ------------------------------------------------
function CourseMap(props) {
  var lat = props.lat;
  var lng = props.lng;
  var name = props.name;
  if (!lat || !lng) return null;
  var zoom = 15;
  var src = "https://www.openstreetmap.org/export/embed.html?bbox="
    + (lng - 0.012) + "," + (lat - 0.008) + ","
    + (lng + 0.012) + "," + (lat + 0.008)
    + "&layer=mapnik&marker=" + lat + "," + lng;
  return ce("div", { style: { width: "100%", height: 180, borderRadius: 12, overflow: "hidden", border: "1px solid " + C.cardBorder, marginTop: 12 } },
    ce("iframe", {
      src: src,
      width: "100%",
      height: "180",
      frameBorder: "0",
      scrolling: "no",
      title: name + " map",
      style: { display: "block", pointerEvents: "none" }
    })
  );
}

// ---- PAR ROW ----------------------------------------------------------------
function ParRow(props) {
  var i = props.index;
  var pars = props.pars;
  var onChange = props.onChange;
  return ce("div", { style: { display: "flex", alignItems: "center", background: C.bg, borderRadius: 10, padding: "10px 14px", border: "1px solid " + C.cardBorder, gap: 12 } },
    ce("div", { style: { fontSize: 12, color: C.muted, width: 52, flexShrink: 0 } }, "Hole " + (i + 1)),
    ce("div", { style: { flex: 1, display: "flex", gap: 8, justifyContent: "center" } },
      [3, 4, 5].map(function(p) {
        var active = pars[i] === p;
        return ce("button", {
          key: p,
          onClick: function() { onChange(i, p); },
          style: {
            width: 42, height: 42, borderRadius: 10, cursor: "pointer", fontSize: 15, fontWeight: 800,
            border: "2px solid " + (active ? MG : C.btnBorder),
            background: active ? MG : C.btnBg,
            color: active ? "#FFFFFF" : C.muted
          }
        }, p);
      })
    )
  );
}

function CourseEditor(props) {
  var initial  = props.initial;
  var onSave   = props.onSave;
  var onCancel = props.onCancel;
  var showMap  = props.showMap || false;

  var ns = useState(initial ? initial.name : "");
  var name = ns[0]; var setName = ns[1];
  var hs = useState(initial ? initial.holes : 18);
  var holes = hs[0]; var setHoles = hs[1];
  var ps = useState(initial ? initial.pars.slice() : Array(18).fill(4));
  var pars = ps[0]; var setPars = ps[1];
  var es = useState("");
  var error = es[0]; var setError = es[1];

  var activePars = pars.slice(0, holes);
  var totalPar   = activePars.reduce(function(a, b) { return a + b; }, 0);

  function handlePar(i, p) {
    setPars(function(prev) { var n = prev.slice(); n[i] = p; return n; });
  }

  function handleSave() {
    if (!name.trim()) { setError("Course name is required"); return; }
    onSave({
      id: (initial && initial.id) ? initial.id : ("" + Date.now()),
      name: name.trim(),
      holes: holes,
      pars: pars.slice(),
      lat: initial ? initial.lat : null,
      lng: initial ? initial.lng : null
    });
  }

  return ce("div", { style: { flex: 1, overflowY: "auto", background: C.bg } },
    // Green header bar
    ce("div", { style: { background: C.header, paddingTop: "calc(20px + var(--sat))", paddingRight: "24px", paddingBottom: "18px", paddingLeft: "24px" } },
      ce("button", { onClick: onCancel, style: { background: "none", border: "none", color: "rgba(255,255,255,0.7)", fontSize: 13, cursor: "pointer", padding: "0 0 8px", display: "block" } }, "< Back"),
      ce("div", { style: { fontSize: 10, color: MYB, letterSpacing: "0.12em", textTransform: "uppercase", fontWeight: 700, marginBottom: 4 } }, (initial && initial.id) ? "Edit Course" : "New Course"),
      ce("div", { style: { fontSize: 26, fontWeight: 900, color: "#fff" } }, (initial && initial.id) ? "Edit Scorecard" : "Add Course"),
      (initial && initial.address) ? ce("div", { style: { fontSize: 12, color: "rgba(255,255,255,0.65)", marginTop: 4 } }, initial.address) : null
    ),
    ce("div", { style: { padding: "20px 24px 40px", display: "flex", flexDirection: "column", gap: 20 } },
      // Map preview if coordinates available
      (initial && initial.lat && showMap) ? ce(CourseMap, { lat: initial.lat, lng: initial.lng, name: initial.name }) : null,
      // Name
      ce("div", null,
        ce("div", { style: { fontSize: 10, color: C.muted, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 8, fontWeight: 600 } }, "Course Name"),
        ce("input", { value: name, onChange: function(e) { setName(e.target.value); setError(""); }, placeholder: "e.g. Augusta National", style: { width: "100%", padding: "13px 15px", borderRadius: 10, background: C.input, border: "1.5px solid " + (error ? PC : C.inputBorder), color: C.text, fontSize: 15, outline: "none" } }),
        error ? ce("div", { style: { fontSize: 11, color: PC, marginTop: 6 } }, error) : null
      ),
      // Holes
      ce("div", null,
        ce("div", { style: { fontSize: 10, color: C.muted, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 8, fontWeight: 600 } }, "Holes"),
        ce("div", { style: { display: "flex", gap: 10 } },
          [9, 18].map(function(h) {
            var active = holes === h;
            return ce("button", {

                );

// ---- STABLEFORD TRACKER -----------------------------------------------------
function StablefordTracker(props) {
  var course     = props.course;
  var onComplete = props.onComplete;
  var onExit     = props.onExit;

  var activePars = course.pars.slice(0, course.holes);
  var sc0 = useState(activePars.map(function(p) { return { score: p, putts: 2 }; }));
  var scores = sc0[0]; var setScores = sc0[1];
  var h0 = useState(0);
  var currentHole = h0[0]; var setCurrentHole = h0[1];

  function stablefordPts(score, par) {
    var d = score - par;
    if (d <= -2) return 4;
    if (d === -1) return 3;
    if (d === 0)  return 2;
    if (d === 1)  return 1;
    return 0;
  }

  var currentPar   = activePars[currentHole];
  var currentScore = scores[currentHole].score;
  var totalPts     = scores.reduce(function(a, s, i) { return a + stablefordPts(s.score, activePars[i]); }, 0);
  var curPts       = stablefordPts(currentScore, currentPar);
  var diff         = currentScore - currentPar;
  var ptColor      = diff <= -2 ? "#0B6E3F" : diff === -1 ? MG : diff === 0 ? "#4A8C6E" : diff === 1 ? PC : RED;
  var ptBg         = diff <= -2 ? "#D4EDDA" : diff === -1 ? "#E8F5EE" : diff === 0 ? "#F0FAF4" : diff === 1 ? "#FFF0EB" : "#FFEBEB";
  var ptLabel      = curPts === 4 ? "Eagle" : curPts === 3 ? "Birdie" : curPts === 2 ? "Par" : curPts === 1 ? "Bogey" : "No pts";

  function updateScore(delta) {
    setScores(function(prev) {
      var n = prev.map(function(h) { return Object.assign({}, h); });
      n[currentHole].score = Math.max(1, Math.min(10, n[currentHole].score + delta));
      return n;
    });
  }

  function setQuick(val) {
    setScores(function(prev) {
      var n = prev.map(function(h) { return Object.assign({}, h); });
      if (val >= 1 && val <= 10) n[currentHole].score = val;
      return n;
    });
  }

  return ce("div", { style: { flex: 1, display: "flex", flexDirection: "column", background: C.bg } },
    ce("div", { style: { background: C.header, paddingTop: "calc(16px + var(--sat))", paddingRight: "24px", paddingBottom: "14px", paddingLeft: "24px", flexShrink: 0 } },
      ce("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 12 } },
        ce("div", null,
          ce("div", { style: { fontSize: 10, color: MYB, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.1em" } }, course.name),
          ce("div", { style: { fontSize: 10, color: "rgba(255,255,255,0.6)", marginTop: 2 } }, "Stableford"),
          ce("div", { style: { fontSize: 24, fontWeight: 900, color: "#fff", marginTop: 4 } },
            "Hole " + (currentHole + 1),
            ce("span", { style: { fontSize: 13, color: "rgba(255,255,255,0.5)", fontWeight: 400, marginLeft: 8 } }, "of " + course.holes)
          )
        ),
        ce("div", { style: { textAlign: "right" } },
          ce("div", { style: { fontSize: 10, color: "rgba(255,255,255,0.6)" } }, "Total Points"),
          ce("div", { style: { fontSize: 32, fontWeight: 900, color: MYB } }, totalPts),
          ce("button", { onClick: onExit, style: { fontSize: 10, color: "rgba(255,255,255,0.4)", background: "none", border: "none", cursor: "pointer", display: "block", marginTop: 4 } }, "Exit")
        )
      ),
      ce("div", { style: { overflowX: "auto", display: "flex", gap: 5 } },
        activePars.map(function(_, i) {
          var isActive = i === currentHole;
          var pts = stablefordPts(scores[i].score, activePars[i]);
          var ptc = pts === 4 ? "#0B6E3F" : pts === 3 ? MG : pts === 2 ? "#4A8C6E" : pts === 1 ? PC : RED;
          return ce("div", { key: i, onClick: function() { setCurrentHole(i); },
            style: { flexShrink: 0, width: 32, height: 42, borderRadius: 7, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", cursor: "pointer", border: "2px solid " + (isActive ? MYB : "transparent"), background: "rgba(255,255,255,0.08)", gap: 1 }
          },
            ce("div", { style: { fontSize: 8, color: isActive ? MYB : "rgba(255,255,255,0.4)" } }, i + 1),
            ce("div", { style: { fontSize: 11, fontWeight: 800, color: isActive ? MYB : ptc } }, pts + "pt")
          );
        })
      )
    ),
    ce("div", { style: { flex: 1, overflowY: "auto", padding: "20px 24px 12px" } },
      ce("div", { style: { textAlign: "center", marginBottom: 20 } },
        ce("div", { style: { fontSize: 12, color: C.muted, fontWeight: 600, marginBottom: 4 } }, "PAR " + currentPar),
        ce("div", { style: { fontSize: 96, fontWeight: 900, color: ptColor, lineHeight: 1, marginBottom: 8 } }, currentScore),
        ce("div", { style: { display: "flex", alignItems: "center", justifyContent: "center", gap: 10, marginBottom: 18 } },
          ce("div", { style: { background: ptColor, color: "#fff", borderRadius: 20, padding: "4px 14px", fontSize: 13, fontWeight: 800 } }, ptLabel),
          ce("div", { style: { background: ptBg, color: ptColor, borderRadius: 20, padding: "4px 12px", fontSize: 13, fontWeight: 800, border: "1px solid " + ptColor + "33" } }, curPts + " pt" + (curPts !== 1 ? "s" : ""))
        ),
        ce("div", { style: { display: "flex", alignItems: "center", justifyContent: "center", gap: 32 } },
          ce("button", { onClick: function() { updateScore(-1); }, style: { width: 72, height: 72, borderRadius: 22, fontSize: 36, fontWeight: 700, background: C.card, border: "2px solid " + C.border, color: C.text } }, "-"),
          ce("button", { onClick: function() { updateScore(1); }, style: { width: 72, height: 72, borderRadius: 22, fontSize: 36, fontWeight: 700, background: MG, border: "none", color: "#fff" } }, "+")
        )
      ),
      ce("div", { style: { display: "flex", gap: 8 } },
        [[-1,"Birdie"],[0,"Par"],[1,"Bogey"],[2,"Dbl"]].map(function(pair) {
          var val = currentPar + pair[0];
          var active = currentScore === val;
          var tc = holeColor(val, currentPar);
          return ce("button", { key: pair[1], onClick: function() { setQuick(val); },
            style: { flex: 1, padding: "10px 2px", borderRadius: 10, cursor: "pointer", fontSize: 11, fontWeight: 700, border: "2px solid " + (active ? tc : C.cardBorder), background: active ? tc + "22" : C.card, color: active ? tc : C.muted }
          }, pair[1]);
        })
      )
    ),
    ce("div", { style: { paddingTop: "12px", paddingRight: "20px", paddingBottom: "calc(12px + var(--sab))", paddingLeft: "20px", display: "flex", gap: 10, background: C.card, borderTop: "1px solid " + C.cardBorder, flexShrink: 0 } },
      currentHole > 0 ? ce("button", { onClick: function() { setCurrentHole(function(h) { return h - 1; }); }, style: { flex: 1, padding: "15px", borderRadius: 12, background: C.bgAlt, border: "1px solid " + C.cardBorder, color: C.muted, fontSize: 14, fontWeight: 700 } }, "< Back") : null,
      currentHole < course.holes - 1
        ? ce("button", { onClick: function() { setCurrentHole(function(h) { return h + 1; }); }, style: { flex: 2, padding: "15px", borderRadius: 12, background: MG, border: "none", color: "#fff", fontWeight: 800, fontSize: 15 } }, "Next Hole >")
        : ce("button", { onClick: function() { onComplete({ type: "stableford", totalPts: totalPts, scores: scores, pars: activePars, courseName: course.name, holes: course.holes, date: new Date().toLocaleDateString() }); }, style: { flex: 2, padding: "15px", borderRadius: 12, background: MY, border: "none", color: "#000", fontWeight: 800, fontSize: 15 } }, "Finish  " + totalPts + " pts")
    )
  );
}

// ---- SKINS TRACKER ----------------------------------------------------------
function SkinsTracker(props) {
  var course     = props.course;
  var players    = props.players;
  var onComplete = props.onComplete;
  var onExit     = props.onExit;

  var activePars = course.pars.slice(0, course.holes);
  var np = players.length;

  var sc0 = useState(activePars.map(function(p) { return players.map(function() { return p; }); }));
  var scores = sc0[0]; var setScores = sc0[1];
  var h0 = useState(0);
  var currentHole = h0[0]; var setCurrentHole = h0[1];

  function updateScore(pi, delta) {
    setScores(function(prev) {
      var n = prev.map(function(row) { return row.slice(); });
      n[currentHole][pi] = Math.max(1, Math.min(12, n[currentHole][pi] + delta));
      return n;
    });
  }

  // Calculate skins with carryover
  var playerSkins = players.map(function() { return 0; });
  var pot = 0;
  var skinResults = activePars.map(function(_, i) {
    pot++;
    var hScores = scores[i];
    var minScore = Math.min.apply(null, hScores);
    var winners = [];
    hScores.forEach(function(s, pi) { if (s === minScore) winners.push(pi); });
    if (winners.length === 1) {
      playerSkins[winners[0]] += pot;
      var w = winners[0]; var p = pot; pot = 0;
      return { winner: w, pot: p, tied: false };
    }
    return { winner: null, pot: pot, tied: true };
  });

  var par = activePars[currentHole];
  var carryPot = skinResults[currentHole] ? skinResults[currentHole].pot : pot;

  return ce("div", { style: { flex: 1, display: "flex", flexDirection: "column", background: C.bg } },
    ce("div", { style: { background: C.header, paddingTop: "calc(16px + var(--sat))", paddingRight: "24px", paddingBottom: "14px", paddingLeft: "24px", flexShrink: 0 } },
      ce("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 } },
        ce("div", null,
          ce("div", { style: { fontSize: 10, color: MYB, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.1em" } }, course.name),
          ce("div", { style: { fontSize: 10, color: "rgba(255,255,255,0.6)", marginTop: 2 } }, "Skins  -  Par " + par + (carryPot > 1 ? "  (" + carryPot + " skins on the line)" : "")),
          ce("div", { style: { fontSize: 24, fontWeight: 900, color: "#fff", marginTop: 4 } }, "Hole " + (currentHole + 1) + " of " + course.holes)
        ),
        ce("button", { onClick: onExit, style: { fontSize: 10, color: "rgba(255,255,255,0.4)", background: "none", border: "none", cursor: "pointer" } }, "Exit")
      ),
      ce("div", { style: { display: "flex", gap: 6 } },
        players.map(function(name, pi) {
          return ce("div", { key: pi, style: { flex: 1, background: "rgba(255,255,255,0.12)", borderRadius: 9, padding: "8px 6px", textAlign: "center" } },
            ce("div", { style: { fontSize: 10, fontWeight: 700, color: "rgba(255,255,255,0.75)" } }, name.split(" ")[0]),
            ce("div", { style: { fontSize: 20, fontWeight: 900, color: playerSkins[pi] > 0 ? MYB : "rgba(255,255,255,0.4)" } }, playerSkins[pi])
          );
        })
      )
    ),
    ce("div", { style: { flex: 1, overflowY: "auto", padding: "14px 20px 12px" } },
      ce("div", { style: { display: "flex", flexDirection: "column", gap: 8, marginBottom: 16 } },
        players.map(function(name, pi) {
          var s = scores[currentHole][pi];
          var d = s - par;
          var sc = d < 0 ? "#0B6E3F" : d === 0 ? MG : d <= 2 ? PC : RED;
          return ce("div", { key: pi, style: { background: C.card, borderRadius: 14, border: "1.5px solid " + C.cardBorder, padding: "14px 16px", display: "flex", alignItems: "center", gap: 14 } },
            ce("div", { style: { flex: 1 } },
              ce("div", { style: { fontSize: 14, fontWeight: 700, color: C.text } }, name),
              ce("div", { style: { fontSize: 11, color: sc, marginTop: 2, fontWeight: 600 } }, d === 0 ? "Par" : d < 0 ? (d === -1 ? "Birdie" : "Eagle") : d === 1 ? "Bogey" : "+" + d)
            ),
            ce("div", { style: { display: "flex", alignItems: "center", gap: 12 } },
              ce("button", { onClick: function() { updateScore(pi, -1); }, style: { width: 38, height: 38, borderRadius: 10, background: C.btnBg, border: "1px solid " + C.btnBorder, color: C.text, fontSize: 20, fontWeight: 700 } }, "-"),
              ce("div", { style: { fontSize: 28, fontWeight: 900, color: sc, minWidth: 30, textAlign: "center" } }, s),
              ce("button", { onClick: function() { updateScore(pi, 1); }, style: { width: 38, height: 38, borderRadius: 10, background: MG, border: "none", color: "#fff", fontSize: 20, fontWeight: 700 } }, "+")
            )
          );
        })
      ),
      // Hole summary strip
      ce("div", { style: { background: C.card, borderRadius: 12, border: "1px solid " + C.cardBorder, overflow: "hidden" } },
        ce("div", { style: { display: "flex", padding: "7px 12px", background: C.bgAlt, borderBottom: "1px solid " + C.cardBorder } },
          ce("div", { style: { width: 24, fontSize: 9, color: C.muted, textTransform: "uppercase", fontWeight: 600 } }, "H"),
          players.map(function(n, pi) { return ce("div", { key: pi, style: { flex: 1, textAlign: "center", fontSize: 9, color: C.muted, textTransform: "uppercase", fontWeight: 600, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" } }, n.split(" ")[0]); }),
          ce("div", { style: { width: 56, textAlign: "center", fontSize: 9, color: C.muted, textTransform: "uppercase", fontWeight: 600 } }, "Result")
        ),
        skinResults.map(function(skin, i) {
          var isCurr = i === currentHole;
          return ce("div", { key: i, onClick: function() { setCurrentHole(i); },
            style: { display: "flex", alignItems: "center", padding: "7px 12px", borderBottom: i < skinResults.length - 1 ? "1px solid " + C.cardBorder : "none", background: isCurr ? "#E8F5EE" : i % 2 === 0 ? "transparent" : C.bgAlt + "55", cursor: "pointer" }
          },
            ce("div", { style: { width: 24, fontSize: 11, fontWeight: 700, color: isCurr ? MG : C.muted } }, i + 1),
            players.map(function(_, pi) {
              var s = scores[i][pi];
              var d = s - activePars[i];
              var sc = d < 0 ? "#0B6E3F" : d === 0 ? MG : d <= 2 ? PC : RED;
              return ce("div", { key: pi, style: { flex: 1, textAlign: "center", fontSize: 12, fontWeight: 800, color: sc } }, s);
            }),
            ce("div", { style: { width: 56, textAlign: "center", fontSize: 10, fontWeight: 700, color: skin.winner !== null ? MG : skin.tied ? PC : C.mutedLight } },
              skin.winner !== null ? players[skin.winner].split(" ")[0] + " +" + skin.pot : skin.tied ? "Tied" : "-"
            )
          );
        })
      )
    ),
    ce("div", { style: { paddingTop: "12px", paddingRight: "20px", paddingBottom: "calc(12px + var(--sab))", paddingLeft: "20px", display: "flex", gap: 10, background: C.card, borderTop: "1px solid " + C.cardBorder, flexShrink: 0 } },
      currentHole > 0 ? ce("button", { onClick: function() { setCurrentHole(function(h) { return h - 1; }); }, style: { flex: 1, padding: "15px", borderRadius: 12, background: C.bgAlt, border: "1px solid " + C.cardBorder, color: C.muted, fontSize: 14, fontWeight: 700 } }, "< Back") : null,
      currentHole < course.holes - 1
        ? ce("button", { onClick: function() { setCurrentHole(function(h) { return h + 1; }); }, style: { flex: 2, padding: "15px", borderRadius: 12, background: MG, border: "none", color: "#fff", fontWeight: 800, fontSize: 15 } }, "Next Hole >")
        : ce("button", { onClick: function() { onComplete({ type: "skins", playerSkins: playerSkins, players: players, courseName: course.name, date: new Date().toLocaleDateString() }); }, style: { flex: 2, padding: "15px", borderRadius: 12, background: MY, border: "none", color: "#000", fontWeight: 800, fontSize: 14 } }, "Final Results")
    )
  );
}

// ---- SCRAMBLE TRACKER -------------------------------------------------------
function ScrambleTracker(props) {

      var n = prev.slice();
      n[currentHole] = Math.max(1, Math.min(10, n[currentHole] + delta));

        )

        activePars.map(function(_, i) {

// ---- WOLF TRACKER -----------------------------------------------------------
function WolfTracker(props) {
  var course     = props.course;
  var players    = props.players;
  var onComplete = props.onComplete;
  var onExit     = props.onExit;

  var activePars = course.pars.slice(0, course.holes);
  var np = players.length;

  var hs0 = useState(activePars.map(function(p) {
    return { partner: null, goSolo: false, scored: false, scores: players.map(function() { return p; }) };
  }));
  var holeStates = hs0[0]; var setHoleStates = hs0[1];
  var h0 = useState(0);
  var currentHole = h0[0]; var setCurrentHole = h0[1];
  var pts0 = useState(players.map(function() { return 0; }));
  var pts = pts0[0]; var setPts = pts0[1];

  var wolfIdx = currentHole % np;
  var hState  = holeStates[currentHole];
  var par     = activePars[currentHole];
  var decided = hState.partner !== null || hState.goSolo;

  function updateScore(pi, delta) {
    setHoleStates(function(prev) {
      var n = prev.map(function(h) { return Object.assign({}, h, { scores: h.scores.slice() }); });
      n[currentHole].scores[pi] = Math.max(1, Math.min(12, n[currentHole].scores[pi] + delta));
      return n;
    });
  }

  function setPartner(pi) {
    setHoleStates(function(prev) {
      var n = prev.map(function(h) { return Object.assign({}, h); });
      n[currentHole].partner = pi;
      n[currentHole].goSolo = false;
      return n;
    });
  }

  function setSolo() {
    setHoleStates(function(prev) {
      var n = prev.map(function(h) { return Object.assign({}, h); });
      n[currentHole].goSolo = true;
      n[currentHole].partner = null;
      return n;
    });
  }

  function scoreAndAdvance() {
    var hs = holeStates[currentHole];
    var hScores = hs.scores;
    var newPts = pts.slice();

    if (hs.goSolo) {
      var wolfScore = hScores[wolfIdx];
      var others = [];
      players.forEach(function(_, pi) { if (pi !== wolfIdx) others.push(pi); });
      var wolfWins = others.every(function(pi) { return wolfScore < hScores[pi]; });
      if (wolfWins) { newPts[wolfIdx] += np; }
      else { others.forEach(function(pi) { newPts[pi] += 2; }); }
    } else if (hs.partner !== null) {
      var partner = hs.partner;
      var ourBest = Math.min(hScores[wolfIdx], hScores[partner]);
      var theirScores = [];
      players.forEach(function(_, pi) { if (pi !== wolfIdx && pi !== partner) theirScores.push(hScores[pi]); });
      var theirBest = Math.min.apply(null, theirScores);
      if (ourBest < theirBest) { newPts[wolfIdx] += 2; newPts[partner] += 2; }
      else { players.forEach(function(_, pi) { if (pi !== wolfIdx && pi !== partner) newPts[pi] += 2; }); }
    }

    setHoleStates(function(prev) {
      var n = prev.map(function(h) { return Object.assign({}, h); });
      n[currentHole].scored = true;
      return n;
    });
    setPts(newPts);

    if (currentHole < course.holes - 1) { setCurrentHole(currentHole + 1); }
    else { onComplete({ type: "wolf", pts: newPts, players: players, courseName: course.name, date: new Date().toLocaleDateString() }); }
  }

  return ce("div", { style: { flex: 1, display: "flex", flexDirection: "column", background: C.bg } },
    ce("div", { style: { background: C.header, paddingTop: "calc(16px + var(--sat))", paddingRight: "24px", paddingBottom: "14px", paddingLeft: "24px", flexShrink: 0 } },
      ce("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 } },
        ce("div", null,
          ce("div", { style: { fontSize: 10, color: MYB, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.1em" } }, course.name),
          ce("div", { style: { fontSize: 10, color: "rgba(255,255,255,0.6)", marginTop: 2 } }, "Wolf  -  Hole " + (currentHole + 1) + " of " + course.holes),
          ce("div", { style: { fontSize: 20, fontWeight: 900, color: MYB, marginTop: 6 } }, players[wolfIdx] + " is the Wolf")
        ),
        ce("button", { onClick: onExit, style: { fontSize: 10, color: "rgba(255,255,255,0.4)", background: "none", border: "none", cursor: "pointer" } }, "Exit")
      ),
      ce("div", { style: { display: "flex", gap: 5 } },
        players.map(function(name, pi) {
          var isWolf = pi === wolfIdx;
          return ce("div", { key: pi, style: { flex: 1, background: isWolf ? MYB : "rgba(255,255,255,0.1)", borderRadius: 8, padding: "7px 4px", textAlign: "center" } },
            ce("div", { style: { fontSize: 9, fontWeight: 800, color: isWolf ? "#000" : "rgba(255,255,255,0.6)", textTransform: "uppercase" } }, isWolf ? "Wolf" : name.split(" ")[0]),
            ce("div", { style: { fontSize: 18, fontWeight: 900, color: isWolf ? "#000" : MYB } }, pts[pi])
          );
        })
      )
    ),
    ce("div", { style: { flex: 1, overflowY: "auto", padding: "16px 20px 12px" } },
      // Step 1: choose partner or go solo
      !decided ? ce("div", { style: { marginBottom: 16 } },
        ce("div", { style: { fontSize: 12, color: C.muted, fontWeight: 600, marginBottom: 12 } }, "Wolf chooses after seeing tee shots:"),
        ce("div", { style: { display: "flex", flexDirection: "column", gap: 8 } },
          players.map(function(name, pi) {
            if (pi === wolfIdx) return null;
            return ce("button", { key: pi, onClick: function() { setPartner(pi); },
              style: { width: "100%", padding: "15px 18px", borderRadius: 14, background: "#E8F5EE", border: "2px solid " + MG + "44", color: MG, fontSize: 15, fontWeight: 800, textAlign: "left", cursor: "pointer" }
            }, "Partner with " + name);
          }),
          ce("button", { onClick: setSolo,
            style: { width: "100%", padding: "15px 18px", borderRadius: 14, background: "#FFF0EB", border: "2px solid " + PC + "44", color: PC, fontSize: 15, fontWeight: 800, cursor: "pointer" }
          }, "Go Solo  (2x points if Wolf wins)")
        )
      ) : null,
      // Step 2: enter scores
      decided ? ce("div", null,
        ce("div", { style: { background: hState.goSolo ? "#FFF0EB" : "#E8F5EE", borderRadius: 12, padding: "10px 14px", marginBottom: 12, border: "1.5px solid " + (hState.goSolo ? PC + "55" : MG + "55") } },
          ce("div", { style: { fontSize: 13, fontWeight: 700, color: hState.goSolo ? PC : MG } },
            hState.goSolo
              ? players[wolfIdx] + " going SOLO  vs all"
              : players[wolfIdx] + " + " + players[hState.partner] + "  vs the field"
          ),
          ce("div", { style: { fontSize: 10, color: C.muted, marginTop: 3 } }, "Par " + par + "  -  Enter all scores then tap Score Hole")
        ),
        ce("div", { style: { display: "flex", flexDirection: "column", gap: 8 } },
          players.map(function(name, pi) {
            var s = hState.scores[pi];
            var d = s - par;
            var sc = d < 0 ? "#0B6E3F" : d === 0 ? MG : d <= 2 ? PC : RED;
            var isWolf    = pi === wolfIdx;
            var isPartner = hState.partner === pi;
            return ce("div", { key: pi, style: { background: C.card, borderRadius: 12, border: "2px solid " + ((isWolf || isPartner) ? MG + "55" : C.cardBorder), padding: "12px 16px", display: "flex", alignItems: "center", gap: 12 } },
              ce("div", { style: { flex: 1 } },
                ce("div", { style: { fontSize: 13, fontWeight: 700, color: C.text } }, name),
                ce("div", { style: { fontSize: 10, color: isWolf ? MYB : isPartner ? MG : C.muted, fontWeight: 700, textTransform: "uppercase", marginTop: 2 } }, isWolf ? "Wolf" : isPartner ? "Partner" : "")
              ),
              ce("div", { style: { display: "flex", alignItems: "center", gap: 12 } },
                ce("button", { onClick: function() { updateScore(pi, -1); }, style: { width: 36, height: 36, borderRadius: 9, background: C.btnBg, border: "1px solid " + C.btnBorder, color: C.text, fontSize: 20, fontWeight: 700 } }, "-"),
                ce("div", { style: { fontSize: 26, fontWeight: 900, color: sc, minWidth: 28, textAlign: "center" } }, s),
                ce("button", { onClick: function() { updateScore(pi, 1); }, style: { width: 36, height: 36, borderRadius: 9, background: MG, border: "none", color: "#fff", fontSize: 20, fontWeight: 700 } }, "+")
              )
            );
          })
        )
      ) : null
    ),
    ce("div", { style: { paddingTop: "12px", paddingRight: "20px", paddingBottom: "calc(12px + var(--sab))", paddingLeft: "20px", display: "flex", gap: 10, background: C.card, borderTop: "1px solid " + C.cardBorder, flexShrink: 0 } },
      currentHole > 0 ? ce("button", { onClick: function() { setCurrentHole(function(h) { return h - 1; }); }, style: { flex: 1, padding: "15px", borderRadius: 12, background: C.bgAlt, border: "1px solid " + C.cardBorder, color: C.muted, fontSize: 14, fontWeight: 700 } }, "< Back") : null,
      decided ? ce("button", { onClick: scoreAndAdvance,
        style: { flex: 2, padding: "15px", borderRadius: 12, background: currentHole < course.holes - 1 ? MG : MY, border: "none", color: currentHole < course.holes - 1 ? "#fff" : "#000", fontWeight: 800, fontSize: 15 }
      }, currentHole < course.holes - 1 ? "Score Hole >" : "Final Results") : null
    )
  );
}

// ---- HANDICAP CALCULATOR (pulls from round history) -------------------------
function HandicapCalc(props) {
  var onClose = props.onClose;
  var history = props.history || [];

  var excl0 = useState({});
  var excluded = excl0[0]; var setExcluded = excl0[1];

  var allDiffs = history.slice(0, 20).map(function(r) {
    return {
      courseName: r.courseName || "Round",
      date:       r.date || "",
      score:      r.totalScore,
      par:        r.totalPar,
      holes:      r.holes || 18,
      diff:       r.holes === 9 ? (r.totalScore - r.totalPar) * 2 : (r.totalScore - r.totalPar)
    };
  });

  function toggleExclude(i) {
    setExcluded(function(prev) {
      var n = Object.assign({}, prev);
      if (n[i]) delete n[i]; else n[i] = true;
      return n;
    });
  }

  var includedDiffs = allDiffs.filter(function(_, i) { return !excluded[i]; }).map(function(r) { return r.diff; });

  function getBestCount(n) {
    if (n >= 20) return 8; if (n >= 17) return 7; if (n >= 14) return 6;
    if (n >= 11) return 5; if (n >= 9)  return 4; if (n >= 7)  return 3;
    if (n >= 5)  return 2; return 1;
  }

  var handicapIndex = null;
  if (includedDiffs.length >= 3) {
    var sorted = includedDiffs.slice().sort(function(a, b) { return a - b; });
    var useCount = getBestCount(sorted.length);
    var best = sorted.slice(0, useCount);
    var avg = best.reduce(function(a, b) { return a + b; }, 0) / best.length;
    handicapIndex = Math.round(avg * 10) / 10;
  }

  return ce("div", { style: { position: "fixed", inset: 0, background: C.bg, zIndex: 300, display: "flex", flexDirection: "column", maxWidth: 430, margin: "0 auto" } },
    ce("div", { style: { background: C.header, paddingTop: "calc(20px + var(--sat))", paddingRight: "24px", paddingBottom: "18px", paddingLeft: "24px", flexShrink: 0 } },
      ce("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "flex-start" } },
        ce("div", null,
          ce("div", { style: { fontSize: 10, color: MYB, textTransform: "uppercase", letterSpacing: "0.12em", fontWeight: 700, marginBottom: 4 } }, "Optional"),
          ce("div", { style: { fontSize: 26, fontWeight: 900, color: "#fff" } }, "Handicap Index")
        ),
        ce("button", { onClick: onClose, style: { width: 36, height: 36, borderRadius: 10, background: "rgba(255,255,255,0.15)", border: "none", color: "#fff", fontSize: 16, cursor: "pointer" } }, "X")
      ),
      handicapIndex !== null ? ce("div", { style: { marginTop: 14, background: "rgba(255,255,255,0.12)", borderRadius: 12, padding: "12px 18px", display: "flex", alignItems: "center", justifyContent: "space-between" } },
        ce("div", null,
          ce("div", { style: { fontSize: 12, color: "rgba(255,255,255,0.75)", fontWeight: 600 } }, "Handicap Index"),
          ce("div", { style: { fontSize: 10, color: "rgba(255,255,255,0.45)", marginTop: 3 } }, "Best " + getBestCount(includedDiffs.length) + " of " + includedDiffs.length + " rounds  (USGA method)")
        ),
        ce("div", { style: { fontSize: 44, fontWeight: 900, color: MYB } }, handicapIndex > 0 ? "+" + handicapIndex : "" + handicapIndex)
      ) : history.length === 0 ? null :
        ce("div", { style: { marginTop: 12, background: "rgba(255,255,255,0.1)", borderRadius: 10, padding: "10px 14px", fontSize: 12, color: "rgba(255,255,255,0.6)" } }, "Play at least 3 rounds to calculate.")
    ),
    ce("div", { style: { flex: 1, overflowY: "auto", padding: "16px 20px 40px" } },
      history.length === 0 ?
        ce("div", { style: { textAlign: "center", padding: "40px 20px" } },
          ce("div", { style: { fontSize: 14, fontWeight: 700, color: C.text, marginBottom: 10 } }, "No rounds logged yet"),
          ce("div", { style: { fontSize: 12, color: C.muted, lineHeight: 1.7 } }, "Save rounds after playing and they will appear here automatically. Your last 20 rounds feed the calculation.")
        ) :
        ce("div", null,
          ce("div", { style: { fontSize: 11, color: C.muted, marginBottom: 14, lineHeight: 1.6 } }, "Tap a row to exclude it from the calculation. 9-hole rounds are doubled."),
          ce("div", { style: { background: C.card, borderRadius: 14, border: "1px solid " + C.cardBorder, overflow: "hidden", marginBottom: 16 } },
            ce("div", { style: { display: "flex", padding: "8px 14px", background: C.bgAlt, borderBottom: "1px solid " + C.cardBorder } },
              ce("div", { style: { flex: 1, fontSize: 10, color: C.muted, textTransform: "uppercase", fontWeight: 600 } }, "Round"),
              ce("div", { style: { width: 50, textAlign: "center", fontSize: 10, color: C.muted, textTransform: "uppercase", fontWeight: 600 } }, "Score"),
              ce("div", { style: { width: 42, textAlign: "center", fontSize: 10, color: C.muted, textTransform: "uppercase", fontWeight: 600 } }, "Par"),
              ce("div", { style: { width: 48, textAlign: "center", fontSize: 10, color: C.muted, textTransform: "uppercase", fontWeight: 600 } }, "Diff")
            ),
            allDiffs.map(function(r, i) {
              var isExcl = !!excluded[i];
              var d = r.diff;
              var dc = d < 0 ? "#0B6E3F" : d === 0 ? MG : d <= 5 ? PC : RED;
              return ce("div", { key: i, onClick: function() { toggleExclude(i); },
                style: { display: "flex", alignItems: "center", padding: "9px 14px", borderBottom: i < allDiffs.length - 1 ? "1px solid " + C.cardBorder : "none", background: isExcl ? "#FFF5F5" : i % 2 === 0 ? "transparent" : C.bgAlt + "66", cursor: "pointer", opacity: isExcl ? 0.45 : 1 }
              },
                ce("div", { style: { flex: 1, minWidth: 0 } },
                  ce("div", { style: { fontSize: 12, fontWeight: 600, color: C.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", textDecoration: isExcl ? "line-through" : "none" } }, r.courseName),
                  ce("div", { style: { fontSize: 10, color: C.mutedLight, marginTop: 1 } }, r.date + (r.holes === 9 ? "  9H" : ""))
                ),
                ce("div", { style: { width: 50, textAlign: "center", fontSize: 13, fontWeight: 700, color: C.text } }, r.score),
                ce("div", { style: { width: 42, textAlign: "center", fontSize: 12, color: C.muted } }, r.par),
                ce("div", { style: { width: 48, textAlign: "center", fontSize: 13, fontWeight: 800, color: isExcl ? C.muted : dc } }, d > 0 ? "+" + d : "" + d)
              );
            })
          ),
          ce("div", { style: { fontSize: 11, color: C.mutedLight, textAlign: "center", lineHeight: 1.7 } }, "For an official USGA Handicap Index, use the GHIN app.")
        )
    )
  );
}

// ---- MAIN APP ---------------------------------------------------------------
function AppInner() {

  function updateHole(key, delta) {
    setScores(function(prev) {
      var n = prev.map(function(h) { return Object.assign({}, h); });
      var cur = n[currentHole];
      if (key === "gir") { cur.gir = !cur.gir; }
      else {
        var val = cur[key] + delta;
        if (key === "score") val = Math.max(1, Math.min(10, val));
        if (key === "putts") val = Math.max(0, Math.min(10, val));
        cur[key] = val;
      }
      return n;
    });
  }

  function setQuickScore(val) {
    setScores(function(prev) {

            ce("button", {
              onClick: function() { updateHole("score", 1); },
              style: { width: 72, height: 72, borderRadius: 22, fontSize: 36, fontWeight: 700, background: atMax ? C.bgAlt : MG, border: "none", color: atMax ? C.mutedLight : "#fff" }
            }, "+")
          )
        ),

        // Quick taps
        ce("div", { style: { display: "flex", gap: 8, marginBottom: 14 } },
          quickTaps.map(function(qt) {
            var val = currentPar + qt.d;
            var active = currentHoleData.score === val;
            var tc = holeColor(val, currentPar);
            var tbg = holeBg(val, currentPar);
            return ce("button", {
              key: qt.label,
              onClick: function() { if (val >= 1 && val <= 10) setQuickScore(val); },
              style: { flex: 1, padding: "10px 2px", borderRadius: 10, cursor: "pointer", fontSize: 11, fontWeight: 700, border: "2px solid " + (active ? tc : C.cardBorder), background: active ? tbg : C.card, color: active ? tc : C.muted }
            }, qt.label);
          })
        ),

        // Putts
        ce("div", { style: { background: C.card, borderRadius: 14, padding: "14px 18px", border: "1px solid " + C.cardBorder, display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 } },
          ce("div", { style: { fontSize: 14, fontWeight: 700, color: C.text } }, "Putts"),
          ce("div", { style: { display: "flex", alignItems: "center", gap: 18 } },
            ce("button", { onClick: function() { updateHole("putts", -1); }, style: { width: 40, height: 40, borderRadius: 10, background: C.btnBg, border: "1.5px solid " + C.btnBorder, color: C.text, fontSize: 22, fontWeight: 700 } }, "-"),
            ce("div", { style: { fontSize: 26, fontWeight: 900, color: MG, minWidth: 32, textAlign: "center" } }, currentHoleData.putts),
            ce("button", { onClick: function() { updateHole("putts", 1); }, style: { width: 40, height: 40, borderRadius: 10, background: MG, border: "none", color: "#fff", fontSize: 22, fontWeight: 700 } }, "+")
          )
        ),

        // GIR
        ce("button", {
          onClick: function() { updateHole("gir", 0); },
          style: { width: "100%", padding: "14px 18px", borderRadius: 14, cursor: "pointer", fontSize: 14, fontWeight: 700, background: currentHoleData.gir ? "#E8F5EE" : C.card, color: currentHoleData.gir ? MG : C.muted, border: "2px solid " + (currentHoleData.gir ? MG + "66" : C.cardBorder) }
        }, currentHoleData.gir ? "Green in Regulation" : "Missed Green  (tap to mark GIR)")
      ),

      // Nav
      ce("div", { style: { paddingTop: "12px", paddingRight: "20px", paddingBottom: "calc(12px + var(--sab))", paddingLeft: "20px", display: "flex", gap: 10, background: C.card, borderTop: "1px solid " + C.cardBorder, flexShrink: 0 } },
        currentHole > 0 ? ce("button", { onClick: function() { setCurrentHole(function(h) { return h - 1; }); }, style: { flex: 1, padding: "15px", borderRadius: 12, background: C.bgAlt, border: "1px solid " + C.cardBorder, color: C.muted, fontSize: 14, fontWeight: 700 } }, "< Back") : null,
        currentHole < selectedCourse.holes - 1
          ? ce("button", { onClick: function() { setCurrentHole(function(h) { return h + 1; }); }, style: { flex: 2, padding: "15px", borderRadius: 12, background: MG, border: "none", color: "#fff", fontWeight: 800, fontSize: 15 } }, "Next Hole >")
          : ce("button", { onClick: function() { setView("summary"); }, style: { flex: 2, padding: "15px", borderRadius: 12, background: MY, border: "none", color: "#000", fontWeight: 800, fontSize: 15 } }, "Finish Round")
      )
    );
  }

  // ---- SUMMARY ----
  if (view === "summary" && selectedCourse) {
    var totalScore = scores.reduce(function(a, b) { return a + b.score; }, 0);
    var totalPar   = selectedCourse.pars.slice(0, selectedCourse.holes).reduce(function(a, b) { return a + b; }, 0);
    var totalPutts = scores.reduce(function(a, b) { return a + b.putts; }, 0);
    var girCount   = scores.filter(function(s) { return s.gir; }).length;
    var finalDiff  = totalScore - totalPar;
    var xpEarned   = calcXP(totalScore, totalPar, selectedCourse.holes);
    var bigColor   = finalDiff < 0 ? "#0B6E3F" : finalDiff === 0 ? MG : finalDiff <= 5 ? PC : RED;
    var bigBg      = finalDiff < 0 ? "#D4EDDA" : finalDiff === 0 ? "#E8F5EE" : finalDiff <= 5 ? "#FFF0EB" : "#FFEBEB";
    var activePars = selectedCourse.pars.slice(0, selectedCourse.holes);
    var f9Par      = activePars.slice(0, 9).reduce(function(a, b) { return a + b; }, 0);
    var b9Par      = selectedCourse.holes === 18 ? activePars.slice(9).reduce(function(a, b) { return a + b; }, 0) : 0;
    var f9Score    = scores.slice(0, 9).reduce(function(a, b) { return a + b.score; }, 0);
    var b9Score    = selectedCourse.holes === 18 ? scores.slice(9).reduce(function(a, b) { return a + b.score; }, 0) : 0;

    return ce("div", { style: { flex: 1, display: "flex", flexDirection: "column", overflow: "hidden", background: C.bg } },
      // Green header
      ce("div", { style: { background: C.header, paddingTop: "calc(20px + var(--sat))", paddingRight: "24px", paddingBottom: "18px", paddingLeft: "24px", flexShrink: 0 } },
        ce("div", { style: { textAlign: "center" } },
          ce("div", { style: { fontSize: 10, color: MYB, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.14em", marginBottom: 6 } }, "Leaderboard Updated"),
          selectedCourse.name !== "Standard Round" ? ce("div", { style: { fontSize: 14, color: "rgba(255,255,255,0.65)", marginBottom: 4 } }, selectedCourse.name) : null,
          ce("div", { style: { fontSize: 72, fontWeight: 900, lineHeight: 1, color: "#fff" } }, diffStr(finalDiff)),
          ce("div", { style: { fontSize: 14, color: "rgba(255,255,255,0.6)", marginTop: 4 } }, totalScore + " strokes   Par " + totalPar)
        )
      ),
      // Scrollable content
      ce("div", { style: { flex: 1, overflowY: "auto", padding: "16px 20px 40px" } },
        // XP banner
        ce("div", { style: { background: "#E8F5EE", border: "1.5px solid " + MG + "44", borderRadius: 14, padding: "14px 18px", display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 } },
          ce("div", null,
            ce("div", { style: { fontSize: 13, color: MG, fontWeight: 800 } }, "XP Earned"),
            ce("div", { style: { fontSize: 11, color: C.muted } }, "Score bonus included")
          ),
          ce("div", { style: { fontSize: 38, fontWeight: 900, color: MG } }, "+" + xpEarned)
        ),
        // Stats row
        ce("div", { style: { display: "flex", gap: 8, marginBottom: 14 } },
          [{ l: "Putts", v: totalPutts }, { l: "Avg Putts", v: (totalPutts / selectedCourse.holes).toFixed(1) }, { l: "GIR", v: girCount + "/" + selectedCourse.holes }].map(function(item) {
            return ce("div", { key: item.l, style: { flex: 1, background: C.card, borderRadius: 12, padding: "12px 8px", border: "1px solid " + C.cardBorder, textAlign: "center" } },
              ce("div", { style: { fontSize: 18, fontWeight: 900, color: MG } }, item.v),
              ce("div", { style: { fontSize: 9, color: C.muted, textTransform: "uppercase", letterSpacing: "0.06em", marginTop: 3 } }, item.l)
            );
          })
        ),
        // Front/Back
        selectedCourse.holes === 18 ? ce("div", { style: { display: "flex", gap: 8, marginBottom: 14 } },
          [["Front 9", f9Score, f9Par], ["Back 9", b9Score, b9Par]].map(function(trio) {
            var d = trio[1] - trio[2];
            var dc = d < 0 ? "#0B6E3F" : d === 0 ? MG : d <= 3 ? PC : RED;
            var dbg = d < 0 ? "#D4EDDA" : d === 0 ? "#E8F5EE" : d <= 3 ? "#FFF0EB" : "#FFEBEB";
            return ce("div", { key: trio[0], style: { flex: 1, background: C.card, borderRadius: 12, padding: "12px", border: "1px solid " + C.cardBorder, textAlign: "center" } },
              ce("div", { style: { fontSize: 10, color: C.muted, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 5 } }, trio[0]),
              ce("div", { style: { fontSize: 24, fontWeight: 900, color: dc, background: dbg, borderRadius: 8, padding: "4px 0" } }, diffStr(d)),
              ce("div", { style: { fontSize: 11, color: C.muted, marginTop: 4 } }, trio[1] + " / Par " + trio[2])
            );
          })
        ) : null,
        // Scorecard table
        ce("div", { style: { background: C.card, borderRadius: 14, border: "1px solid " + C.cardBorder, overflow: "hidden", marginBottom: 16 } },
          ce("div", { style: { display: "flex", padding: "8px 14px", borderBottom: "1px solid " + C.cardBorder, background: C.bgAlt } },
            ce("div", { style: { flex: 1, fontSize: 10, color: C.muted, textTransform: "uppercase", fontWeight: 600 } }, "Hole"),
            ce("div", { style: { width: 36, textAlign: "center", fontSize: 10, color: C.muted, textTransform: "uppercase", fontWeight: 600 } }, "Par"),
            ce("div", { style: { width: 46, textAlign: "center", fontSize: 10, color: C.muted, textTransform: "uppercase", fontWeight: 600 } }, "Score"),
            ce("div", { style: { width: 36, textAlign: "center", fontSize: 10, color: C.muted, textTransform: "uppercase", fontWeight: 600 } }, "+/-"),
            ce("div", { style: { width: 36, textAlign: "center", fontSize: 10, color: C.muted, textTransform: "uppercase", fontWeight: 600 } }, "Putts")
          ),
          scores.map(function(s, i) {
            var p = selectedCourse.pars[i];
            var d = s.score - p;
            var sc = d < 0 ? "#0B6E3F" : d === 0 ? MG : d === 1 ? PC : RED;
            var sbg = d < 0 ? "#D4EDDA" : d === 0 ? "#F0FAF4" : d === 1 ? "#FFF5F0" : "#FFEEEE";
            return ce("div", { key: i, style: { display: "flex", alignItems: "center", padding: "7px 14px", borderBottom: i < scores.length - 1 ? "1px solid " + C.cardBorder : "none", background: i % 2 === 0 ? "transparent" : C.bgAlt + "66" } },
              ce("div", { style: { flex: 1, fontSize: 12, color: C.muted, display: "flex", alignItems: "center", gap: 5 } },
                i + 1, s.gir ? ce("div", { style: { width: 5, height: 5, borderRadius: "50%", background: MG } }) : null
              ),
              ce("div", { style: { width: 36, textAlign: "center", fontSize: 12, color: C.muted } }, p),
              ce("div", { style: { width: 46, textAlign: "center", fontSize: 14, fontWeight: 800, color: sc, background: sbg, borderRadius: 6, margin: "2px 0" } }, s.score),
              ce("div", { style: { width: 36, textAlign: "center", fontSize: 12, fontWeight: 700, color: sc } }, diffStr(d)),
              ce("div", { style: { width: 36, textAlign: "center", fontSize: 12, color: C.muted } }, s.putts)
            );
          }),
          ce("div", { style: { display: "flex", alignItems: "center", padding: "10px 14px", background: C.bgAlt, borderTop: "2px solid " + C.cardBorder } },
            ce("div", { style: { flex: 1, fontSize: 13, fontWeight: 800, color: C.text } }, "Total"),
            ce("div", { style: { width: 36, textAlign: "center", fontSize: 13, fontWeight: 700, color: C.text } }, totalPar),
            ce("div", { style: { width: 46, textAlign: "center", fontSize: 16, fontWeight: 900, color: bigColor, background: bigBg, borderRadius: 7, margin: "2px 0" } }, totalScore),
            ce("div", { style: { width: 36, textAlign: "center", fontSize: 14, fontWeight: 900, color: bigColor } }, diffStr(finalDiff)),
            ce("div", { style: { width: 36, textAlign: "center", fontSize: 13, fontWeight: 700, color: MG } }, totalPutts)
          )
        ),
        ce("div", { style: { fontSize: 10, color: C.mutedLight, marginBottom: 16, textAlign: "center" } }, "Green dot in scorecard = GIR"),
        ce("button", {
          onClick: function() {
            var round = { courseId: selectedCourse.id, courseName: selectedCourse.name, holes: selectedCourse.holes, pars: selectedCourse.pars.slice(), scoreDiff: finalDiff, totalScore: totalScore, totalPar: totalPar, totalPutts: totalPutts, girCount: girCount, date: new Date().toLocaleDateString(), xp: xpEarned, holeData: scores.slice() };
            var next = [round].concat(history);
            setHistory(next); saveJSON(HISTORY_KEY, next); setView("setup");
          },
          style: { width: "100%", padding: "16px", borderRadius: 14, background: MG, border: "none", color: "#fff", fontSize: 15, fontWeight: 800 }
        }, "Save Round  +" + xpEarned + " XP"),
        ce("button", { onClick: function() { setView("playing"); }, style: { width: "100%", marginTop: 10, padding: "13px", borderRadius: 14, background: "transparent", border: "1.5px solid " + C.cardBorder, color: C.muted, fontSize: 13 } }, "< Back to Scorecard")
      )
    );
  }

  // Fallback / overlay-only state
  return ce("div", { style: { flex: 1, background: C.bg } },
    showHistory ? ce(HistoryLog, { history: history, onClose: function() { setShowHistory(false); } }) : null
  );
}

try {
  ReactDOM.createRoot(document.getElementById("root")).render(ce(AppInner, null));
} catch(e) {
  console.error("Mount error:", e);
  document.getElementById("fallback").style.display = "flex";
}

  </script>

</body>
</html>
