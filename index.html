<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Golf Tracker</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; }
    body { height: 100vh; background: #F5F7F5; color: #041E0F; overflow: hidden; }
    #root { height: 100%; display: flex; flex-direction: column; max-width: 430px; margin: 0 auto; background: #F5F7F5; position: relative; }
    
    .pwa-header { padding-top: env(safe-area-inset-top); background: #006747; color: #FFF; flex-shrink: 0; }
    .pwa-footer { padding-bottom: env(safe-area-inset-bottom); background: #FFF; border-top: 1px solid #D8E5DC; flex-shrink: 0; }
    .scroll-container { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 20px; }
    
    button { cursor: pointer; border: none; transition: all 0.1s; -webkit-tap-highlight-color: transparent; border-radius: 12px; }
    button:active { opacity: 0.7; transform: scale(0.98); }
    
    .mode-card { background: #FFF; border: 1px solid #D8E5DC; border-radius: 14px; padding: 12px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
    .info-btn { width: 24px; height: 24px; border-radius: 12px; background: #EEF4F0; color: #006747; font-size: 14px; font-weight: 800; display: flex; align-items: center; justify-content: center; margin-left: 8px; border: 1px solid #D8E5DC; }
    
    .overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
    .modal { background: #FFF; border-radius: 20px; padding: 24px; width: 100%; max-width: 350px; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
  </style>
</head>
<body>
<div id="root"></div>
<script>
window.onload = function() {
  const { useState } = React;
  const ce = React.createElement;

  const PALETTE = { bg: "#F5F7F5", primary: "#006747", text: "#041E0F", mute: "#667A6F", border: "#D8E5DC", btn: "#EEF4F0" };

  const MODES = [
    { id: "Stroke", label: "Stroke Play", desc: "The most common form of golf. Your total score is the number of strokes taken over the round. Low score wins." },
    { id: "Match", label: "Match Play", desc: "Players compete hole-by-hole. You win a hole by carding a lower score than your opponent. Most holes won wins the match." },
    { id: "Skins", label: "Skins", desc: "Each hole is worth a 'skin'. If the hole is tied, the skin carries over to the next hole, increasing the pot." },
    { id: "Wolf", label: "Wolf", desc: "Players rotate as the 'Wolf'. The Wolf decides to play 1-vs-3 or pick a partner after seeing tee shots." },
    { id: "Stableford", label: "Stableford", desc: "Points are awarded based on your score relative to par: Albatross (5), Eagle (4), Birdie (3), Par (2), Bogey (1)." },
    { id: "Scramble", label: "Scramble", desc: "Team play where everyone hits, the best shot is selected, and everyone plays their next shot from that spot." }
  ];

  const COURSE_DB = [
    { id: 'j_skyway', name: "Skyway Golf Course", location: "Jersey City, NJ", holes: 9, pars: [4,4,3,4,5,4,3,4,4] },
    { id: 'nyc_van_cortlandt', name: "Van Cortlandt Park", location: "Bronx, NY", holes: 18, pars: [4,4,3,4,5,4,3,4,4,4,4,3,4,4,5,4,3,4] }
  ];

  function App() {
    const [view, setView] = useState("setup");
    const [gameMode, setGameMode] = useState("Stroke");
    const [infoModal, setInfoModal] = useState(null);
    const [customPars, setCustomPars] = useState(Array(18).fill(4));
    const [scores, setScores] = useState([]);
    const [currentHole, setCurrentHole] = useState(0);

    const startRound = (course) => {
      setScores(course.pars.map(p => ({ score: p, putts: 2, gir: false })));
      setCurrentHole(0);
      setView("playing");
    };

    if (view === "setup") {
      return ce("div", { style: { flex: 1, display: "flex", flexDirection: "column" } },
        infoModal && ce("div", { className: "overlay", onClick: () => setInfoModal(null) },
          ce("div", { className: "modal", onClick: e => e.stopPropagation() },
            ce("div", { style: { fontWeight: 900, fontSize: 20, marginBottom: 12, color: PALETTE.primary } }, infoModal.label),
            ce("div", { style: { lineHeight: 1.5, color: PALETTE.text, marginBottom: 20 } }, infoModal.desc),
            ce("button", { onClick: () => setInfoModal(null), style: { width: "100%", padding: "12px", background: PALETTE.primary, color: "#FFF", fontWeight: 700 } }, "Got it")
          )
        ),
        ce("div", { className: "pwa-header" },
          ce("div", { style: { padding: "20px 24px" } },
            ce("div", { style: { fontSize: 10, fontWeight: 800, opacity: 0.8 } }, "GOLF TRACKER"),
            ce("div", { style: { fontSize: 28, fontWeight: 900 } }, "Setup")
          )
        ),
        ce("div", { className: "scroll-container" },
          ce("div", { style: { fontWeight: 800, fontSize: 12, color: PALETTE.mute, marginBottom: 10 } }, "SELECT GAME MODE"),
          MODES.map(m => ce("div", { key: m.id, className: "mode-card", style: { border: gameMode === m.id ? `2px solid ${PALETTE.primary}` : `1px solid ${PALETTE.border}` } },
            ce("button", { onClick: () => setGameMode(m.id), style: { flex: 1, textAlign: "left", background: "none", fontWeight: 700, fontSize: 15 } }, m.label),
            ce("button", { className: "info-btn", onClick: () => setInfoModal(m) }, "i")
          )),
          ce("div", { style: { marginTop: 24, fontWeight: 800, fontSize: 12, color: PALETTE.mute, marginBottom: 10 } }, "COURSES"),
          COURSE_DB.map(c => ce("button", {
            key: c.id, onClick: () => startRound(c),
            style: { width: "100%", textAlign: "left", padding: "16px", background: "#FFF", border: "1px solid " + PALETTE.border, borderRadius: 16, marginBottom: 10, display: "flex", justifyContent: "space-between" }
          }, 
            ce("div", null, ce("div", { style: { fontWeight: 700 } }, c.name), ce("div", { style: { fontSize: 12, color: PALETTE.mute } }, c.location)),
            ce("div", { style: { fontWeight: 800, color: PALETTE.primary } }, c.holes + "H")
          )),
          ce("div", { style: { marginTop: 24, fontWeight: 800, fontSize: 12, color: PALETTE.mute, marginBottom: 10 } }, "PAR PICKER"),
          ce("div", { style: { display: "grid", gridTemplateColumns: "repeat(6, 1fr)", gap: 6 } },
            customPars.slice(0, 18).map((p, i) => ce("button", {
              key: i, onClick: () => { const n = [...customPars]; n[i] = n[i] === 5 ? 3 : n[i] + 1; setCustomPars(n); },
              style: { padding: "8px 0", background: PALETTE.btn, fontSize: 11, fontWeight: 800 }
            }, "H" + (i + 1) + ":" + p))
          )
        )
      );
    }

    if (view === "playing") {
      // Logic for the playing view as previously established
      return ce("div", null, "Playing View Active");
    }
  }

  ReactDOM.createRoot(document.getElementById("root")).render(ce(App));
};
</script>
</body>
</html>
