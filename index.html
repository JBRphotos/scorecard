<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Golf Tracker – Simple Start</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 0;
      background: #0b1724;
      color: #f5f5f5;
    }
    .app {
      max-width: 960px;
      margin: 0 auto;
      padding: 16px;
    }
    h1, h2, h3 {
      margin: 0 0 8px;
    }
    .card {
      background: #111c2a;
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    }
    label {
      display: block;
      font-size: 0.9rem;
      margin-bottom: 4px;
    }
    select, input {
      width: 100%;
      padding: 6px 8px;
      border-radius: 4px;
      border: 1px solid #334155;
      background: #020617;
      color: #e5e7eb;
      margin-bottom: 8px;
      box-sizing: border-box;
    }
    button {
      padding: 8px 12px;
      border-radius: 4px;
      border: none;
      background: #22c55e;
      color: #022c22;
      font-weight: 600;
      cursor: pointer;
    }
    button.secondary {
      background: #1e293b;
      color: #e5e7eb;
    }
    button:disabled {
      opacity: 0.5;
      cursor: default;
    }
    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .row > div {
      flex: 1 1 140px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    th, td {
      border-bottom: 1px solid #1f2937;
      padding: 4px 6px;
      text-align: center;
    }
    th {
      background: #020617;
      position: sticky;
      top: 0;
      z-index: 1;
    }
    .tag {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 999px;
      font-size: 0.7rem;
      background: #1e293b;
      color: #e5e7eb;
      margin-left: 4px;
    }
    .pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 0.75rem;
      background: #0f766e;
      color: #ecfeff;
      margin-right: 4px;
    }
    .small {
      font-size: 0.8rem;
      opacity: 0.8;
    }
    .flex-between {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .scroll-x {
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>Golf Tracker</h1>
    <div id="root"></div>
  </div>

  <script>
    // ---------- Utilities ----------
    function loadRounds() {
      try {
        const raw = localStorage.getItem("golf_rounds_v1");
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [];
      } catch (e) {
        console.error("Failed to load rounds", e);
        return [];
      }
    }

    function saveRounds(rounds) {
      try {
        localStorage.setItem("golf_rounds_v1", JSON.stringify(rounds));
      } catch (e) {
        console.error("Failed to save rounds", e);
      }
    }

    function calculateHandicapFromRounds(rounds) {
      if (!rounds.length) return null;
      // Use last 5 rounds (or fewer if less than 5)
      const recent = [...rounds].sort((a, b) => b.date - a.date).slice(0, 5);
      // Simple handicap: average (score - par)
      let diffs = recent
        .filter(r => typeof r.totalScore === "number" && typeof r.coursePar === "number")
        .map(r => r.totalScore - r.coursePar);
      if (!diffs.length) return null;
      const avg = diffs.reduce((a, b) => a + b, 0) / diffs.length;
      return Math.round(avg * 10) / 10;
    }

    function formatDate(ts) {
      const d = new Date(ts);
      return d.toLocaleDateString();
    }

    // ---------- App State ----------
    const state = {
      rounds: loadRounds(),
      view: "setup", // "setup" | "play" | "history"
      currentRound: null,
    };

    function setState(patch) {
      Object.assign(state, patch);
      render();
    }

    // ---------- Start Round / Setup ----------
    function StartView() {
      const container = document.createElement("div");

      const card = document.createElement("div");
      card.className = "card";

      const h2 = document.createElement("h2");
      h2.textContent = "Start a Round";
      card.appendChild(h2);

      const form = document.createElement("div");

      // Game mode
      const modeLabel = document.createElement("label");
      modeLabel.textContent = "Game mode";
      const modeSelect = document.createElement("select");
      ["Stroke Play", "Match Play", "Scramble", "Wolf"].forEach(m => {
        const opt = document.createElement("option");
        opt.value = m;
        opt.textContent = m;
        modeSelect.appendChild(opt);
      });

      // Scramble variant
      const scrambleLabel = document.createElement("label");
      scrambleLabel.textContent = "Scramble variant";
      const scrambleSelect = document.createElement("select");
      ["2-Player Scramble", "4-Player Scramble", "Solo Scramble", "Texas Scramble", "Florida Scramble"].forEach(v => {
        const opt = document.createElement("option");
        opt.value = v;
        opt.textContent = v;
        scrambleSelect.appendChild(opt);
      });

      // Wolf variant
      const wolfLabel = document.createElement("label");
      wolfLabel.textContent = "Wolf variant";
      const wolfSelect = document.createElement("select");
      ["Classic Wolf", "Hammer Wolf", "Blind Wolf", "Simplified Wolf", "Progressive Wolf"].forEach(v => {
        const opt = document.createElement("option");
        opt.value = v;
        opt.textContent = v;
        wolfSelect.appendChild(opt);
      });

      // Players
      const playersLabel = document.createElement("label");
      playersLabel.textContent = "Players (comma separated)";
      const playersInput = document.createElement("input");
      playersInput.type = "text";
      playersInput.placeholder = "e.g. Jesse, Pat, Sam, Riley";

      // Course par
      const parLabel = document.createElement("label");
      parLabel.textContent = "Course par (18 holes)";
      const parInput = document.createElement("input");
      parInput.type = "number";
      parInput.min = "60";
      parInput.max = "80";
      parInput.value = "72";

      // Notes
      const notesLabel = document.createElement("label");
      notesLabel.textContent = "Notes (optional)";
      const notesInput = document.createElement("input");
      notesInput.type = "text";
      notesInput.placeholder = "Course name, tees, conditions...";

      form.appendChild(modeLabel);
      form.appendChild(modeSelect);
      form.appendChild(scrambleLabel);
      form.appendChild(scrambleSelect);
      form.appendChild(wolfLabel);
      form.appendChild(wolfSelect);
      form.appendChild(playersLabel);
      form.appendChild(playersInput);
      form.appendChild(parLabel);
      form.appendChild(parInput);
      form.appendChild(notesLabel);
      form.appendChild(notesInput);

      card.appendChild(form);

      const actions = document.createElement("div");
      actions.className = "flex-between";
      const left = document.createElement("div");
      const right = document.createElement("div");

      const startBtn = document.createElement("button");
      startBtn.textContent = "Start Round";
      startBtn.onclick = () => {
        const mode = modeSelect.value;
        const scrambleVariant = scrambleSelect.value;
        const wolfVariant = wolfSelect.value;
        const playersRaw = playersInput.value.trim();
        const par = parseInt(parInput.value, 10) || 72;

        const players = playersRaw
          ? playersRaw.split(",").map(p => p.trim()).filter(Boolean)
          : ["Player 1"];

        // Basic validation for Wolf (needs 4 players)
        if (mode === "Wolf" && players.length !== 4) {
          alert("Wolf requires exactly 4 players.");
          return;
        }

        const round = {
          id: Date.now(),
          date: Date.now(),
          mode,
          scrambleVariant: mode === "Scramble" ? scrambleVariant : null,
          wolfVariant: mode === "Wolf" ? wolfVariant : null,
          players,
          scores: {}, // { playerName: [per-hole scores] }
          coursePar: par,
          notes: notesInput.value.trim() || "",
          totalScore: null,
        };

        players.forEach(p => {
          round.scores[p] = Array(18).fill(null);
        });

        setState({ currentRound: round, view: "play" });
      };

      const historyBtn = document.createElement("button");
      historyBtn.className = "secondary";
      historyBtn.textContent = "View History";
      historyBtn.onclick = () => setState({ view: "history" });

      left.appendChild(startBtn);
      right.appendChild(historyBtn);
      actions.appendChild(left);
      actions.appendChild(right);

      card.appendChild(actions);

      // Handicap summary
      const hCard = document.createElement("div");
      hCard.className = "card";
      const hTitle = document.createElement("h3");
      hTitle.textContent = "Handicap & Recent Rounds";
      hCard.appendChild(hTitle);

      const handicap = calculateHandicapFromRounds(state.rounds);
      const p = document.createElement("p");
      if (handicap === null) {
        p.textContent = "Not enough data yet. Play some rounds to establish a handicap.";
      } else {
        p.innerHTML = `Current handicap (last 5 rounds): <span class="pill">${handicap >= 0 ? "+" + handicap : handicap}</span>`;
      }
      hCard.appendChild(p);

      const recent = [...state.rounds].sort((a, b) => b.date - a.date).slice(0, 5);
      if (recent.length) {
        const list = document.createElement("div");
        recent.forEach(r => {
          const row = document.createElement("div");
          row.className = "small";
          const diff = typeof r.totalScore === "number" && typeof r.coursePar === "number"
            ? r.totalScore - r.coursePar
            : null;
          row.textContent = `${formatDate(r.date)} – ${r.mode}`;
          if (r.scrambleVariant) row.textContent += ` (${r.scrambleVariant})`;
          if (r.wolfVariant) row.textContent += ` (${r.wolfVariant})`;
          if (diff !== null) {
            const span = document.createElement("span");
            span.className = "tag";
            span.textContent = diff >= 0 ? `+${diff}` : diff;
            row.appendChild(span);
          }
          list.appendChild(row);
        });
        hCard.appendChild(list);
      } else {
        const none = document.createElement("p");
        none.className = "small";
        none.textContent = "No rounds logged yet.";
        hCard.appendChild(none);
      }

      container.appendChild(card);
      container.appendChild(hCard);

      return container;
    }

    // ---------- Play View (simple per-hole entry) ----------
    function PlayView() {
      const round = state.currentRound;
      if (!round) {
        const div = document.createElement("div");
        div.textContent = "No active round.";
        return div;
      }

      const container = document.createElement("div");

      const card = document.createElement("div");
      card.className = "card";

      const header = document.createElement("div");
      header.className = "flex-between";

      const left = document.createElement("div");
      const title = document.createElement("h2");
      title.textContent = "Round in Progress";
      left.appendChild(title);

      const meta = document.createElement("div");
      meta.className = "small";
      meta.textContent = `${round.mode}`;
      if (round.scrambleVariant) meta.textContent += ` • ${round.scrambleVariant}`;
      if (round.wolfVariant) meta.textContent += ` • ${round.wolfVariant}`;
      left.appendChild(meta);

      const right = document.createElement("div");
      const backBtn = document.createElement("button");
      backBtn.className = "secondary";
      backBtn.textContent = "Back to Setup";
      backBtn.onclick = () => setState({ view: "setup", currentRound: null });
      right.appendChild(backBtn);

      header.appendChild(left);
      header.appendChild(right);
      card.appendChild(header);

      const tableWrap = document.createElement("div");
      tableWrap.className = "scroll-x";
      const table = document.createElement("table");
      const thead = document.createElement("thead");
      const trHead = document.createElement("tr");

      const thHole = document.createElement("th");
      thHole.textContent = "Hole";
      trHead.appendChild(thHole);

      round.players.forEach(p => {
        const th = document.createElement("th");
        th.textContent = p;
        trHead.appendChild(th);
      });

      thead.appendChild(trHead);
      table.appendChild(thead);

      const tbody = document.createElement("tbody");

      for (let i = 0; i < 18; i++) {
        const tr = document.createElement("tr");
        const tdHole = document.createElement("td");
        tdHole.textContent = i + 1;
        tr.appendChild(tdHole);

        round.players.forEach(p => {
          const td = document.createElement("td");
          const input = document.createElement("input");
          input.type = "number";
          input.min = "1";
          input.max = "15";
          input.style.width = "60px";
          const val = round.scores[p][i];
          input.value = val == null ? "" : val;
          input.onchange = () => {
            const v = input.value.trim();
            round.scores[p][i] = v === "" ? null : parseInt(v, 10);
          };
          td.appendChild(input);
          tr.appendChild(td);
        });

        tbody.appendChild(tr);
      }

      table.appendChild(tbody);
      tableWrap.appendChild(table);
      card.appendChild(tableWrap);

      const footer = document.createElement("div");
      footer.className = "flex-between";
      const leftF = document.createElement("div");
      const rightF = document.createElement("div");

      const finishBtn = document.createElement("button");
      finishBtn.textContent = "Finish Round";
      finishBtn.onclick = () => {
        // For now, totalScore = sum of first player's scores (or team score in Scramble/Wolf)
        const primary = round.players[0];
        const arr = round.scores[primary] || [];
        const valid = arr.filter(v => typeof v === "number");
        if (!valid.length) {
          if (!confirm("No scores entered. Save round anyway?")) return;
        }
        const total = valid.reduce((a, b) => a + b, 0);
        round.totalScore = valid.length ? total : null;

        const updated = [...state.rounds, round];
        saveRounds(updated);
        setState({ rounds: updated, currentRound: null, view: "history" });
      };

      const cancelBtn = document.createElement("button");
      cancelBtn.className = "secondary";
      cancelBtn.textContent = "Cancel Round";
      cancelBtn.onclick = () => {
        if (confirm("Discard this round?")) {
          setState({ currentRound: null, view: "setup" });
        }
      };

      leftF.appendChild(finishBtn);
      rightF.appendChild(cancelBtn);
      footer.appendChild(leftF);
      footer.appendChild(rightF);

      card.appendChild(footer);

      container.appendChild(card);
      return container;
    }

    // ---------- History View ----------
    function HistoryView() {
      const container = document.createElement("div");

      const card = document.createElement("div");
      card.className = "card";

      const header = document.createElement("div");
      header.className = "flex-between";

      const left = document.createElement("div");
      const h2 = document.createElement("h2");
      h2.textContent = "Round History";
      left.appendChild(h2);

      const right = document.createElement("div");
      const backBtn = document.createElement("button");
      backBtn.className = "secondary";
      backBtn.textContent = "Back";
      backBtn.onclick = () => setState({ view: "setup" });
      right.appendChild(backBtn);

      header.appendChild(left);
      header.appendChild(right);
      card.appendChild(header);

      if (!state.rounds.length) {
        const p = document.createElement("p");
        p.textContent = "No rounds logged yet.";
        card.appendChild(p);
        container.appendChild(card);
        return container;
      }

      const tableWrap = document.createElement("div");
      tableWrap.className = "scroll-x";
      const table = document.createElement("table");
      const thead = document.createElement("thead");
      const trHead = document.createElement("tr");
      ["Date", "Mode", "Variant", "Players", "Score", "Par", "Diff"].forEach(h => {
        const th = document.createElement("th");
        th.textContent = h;
        trHead.appendChild(th);
      });
      thead.appendChild(trHead);
      table.appendChild(thead);

      const tbody = document.createElement("tbody");
      const sorted = [...state.rounds].sort((a, b) => b.date - a.date);
      sorted.forEach(r => {
        const tr = document.createElement("tr");
        const diff = typeof r.totalScore === "number" && typeof r.coursePar === "number"
          ? r.totalScore - r.coursePar
          : null;

        const variant = r.scrambleVariant || r.wolfVariant || "";

        const cols = [
          formatDate(r.date),
          r.mode,
          variant,
          r.players.join(", "),
          r.totalScore == null ? "-" : r.totalScore,
          r.coursePar ?? "-",
          diff == null ? "-" : (diff >= 0 ? "+" + diff : diff),
        ];

        cols.forEach(c => {
          const td = document.createElement("td");
          td.textContent = c;
          tr.appendChild(td);
        });

        tbody.appendChild(tr);
      });

      table.appendChild(tbody);
      tableWrap.appendChild(table);
      card.appendChild(tableWrap);

      container.appendChild(card);
      return container;
    }

    // ---------- Root Render ----------
    function render() {
      const root = document.getElementById("root");
      root.innerHTML = "";

      let viewNode;
      if (state.view === "setup") {
        viewNode = StartView();
      } else if (state.view === "play") {
        viewNode = PlayView();
      } else if (state.view === "history") {
        viewNode = HistoryView();
      } else {
        viewNode = document.createElement("div");
        viewNode.textContent = "Unknown view.";
      }

      root.appendChild(viewNode);
    }

    render();
  </script>
</body>
</html>
