  <style>
    *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: #E8D9BC;
      font-family: 'EB Garamond', Georgia, serif;
      color: #1C1409;
      touch-action: manipulation;
      overscroll-behavior-y: none;
    }
    :root {
      --sat: env(safe-area-inset-top, 0px);
      --sab: env(safe-area-inset-bottom, 0px);
      --parchment:    #F2E8D5;
      --parchment-dk: #E8D9BC;
      --parchment-lt: #FAF4E8;
      --ink:          #1C1409;
      --sepia:        #7A6040;
      --sepia-lt:     #A8906A;
      --sepia-vlt:    #C8B090;
      --brass:        #B8922A;
      --brass-lt:     #D4AE50;
      --brass-dk:     #8A6A18;
      --forest:       #2A4A2A;
      --forest-lt:    #3D6B3D;
      --rule:         #C8A870;
    }
    @media all and (display-mode: standalone) {
      #root { position: fixed; top: 0; left: 0; right: 0; bottom: 0; overflow: hidden; display: flex; flex-direction: column; }
    }
    @media not all and (display-mode: standalone) {
      #root { position: relative; min-height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
    }
    button { -webkit-tap-highlight-color: transparent; outline: none; cursor: pointer; font-family: 'EB Garamond', Georgia, serif; }
    button:active { opacity: 0.82; transform: scale(0.97); }
    ::-webkit-scrollbar { display: none; }
    input, select { font-family: 'EB Garamond', Georgia, serif; }
    input::placeholder { color: #C8B090; }
    select option { background: #F2E8D5; color: #1C1409; }
    .safe-top { padding-top: calc(20px + var(--sat)) !important; }
    .safe-bottom { padding-bottom: calc(12px + var(--sab)) !important; }

    /* Score numbers get Playfair via size - applied in React via direct prop */
    /* All inputs and selects stay in EB Garamond */
    input, select, textarea { font-family: 'EB Garamond', Georgia, serif !important; }

    /* Mono labels for data */
    .mono { font-family: 'DM Mono', monospace !important; }

    #fallback {
      display: none; position: fixed; inset: 0; background: #2A4A2A;
      flex-direction: column; align-items: center; justify-content: center;
      font-family: 'Playfair Display', Georgia, serif;
      padding: 40px 32px; text-align: center; color: #F2E8D5; z-index: 9999;

// ---- HELPERS ----------------------------------------------------------------

function diffStr(d) {
  if (d === 0) return "E";
  return d > 0 ? "+" + d : "" + d;
}

function diffColor(d) {
  if (d < 0)   return "#2A4A2A"; // under par = dark green
  if (d === 0) return MG;
  if (d <= 3)  return PC;
  return RED;
}

function holeColor(score, par) {
  if (score === null || score === undefined) return C.muted;
  var d = score - par;
  if (d <= -2) return "#2A4A2A";
  if (d === -1) return MG;
  if (d === 0)  return "#4A8C6E";
  if (d === 1)  return PC;
  return RED;
}

function holeBg(score, par) {
  if (score === null || score === undefined) return C.card;
  var d = score - par;
  if (d <= -2) return "#D8EAD8";
  if (d === -1) return "#EDE4D0";
  if (d === 0)  return "#F0F9F4";
  if (d === 1)  return "#FFF0EB";
  return "#FFEBEB";
}

function emptyHole(par) {
  return { score: par, putts: 2, gir: false };
}

// ---- COURSE MAP (OSM iframe) ------------------------------------------------
function CourseMap(props) {
  var lat    = props.lat;
  var lng    = props.lng;
  var name   = props.name;
  var height = props.height || 200;

  var mapRef     = useRef(null);
  var leafletRef = useRef(null);

  useEffect(function() {
    if (!lat || !lng || typeof L === "undefined") return;
    var container = mapRef.current;
    if (!container) return;

    if (leafletRef.current) {
      leafletRef.current.remove();
      leafletRef.current = null;
    }

    var timer = setTimeout(function() {
      if (!mapRef.current) return;

      var map = L.map(mapRef.current, {
        center: [lat, lng],
        zoom: 15,
        zoomControl: false,
        attributionControl: false,
        dragging: false,
        scrollWheelZoom: false,
        doubleClickZoom: false,
        touchZoom: false
      });

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19
      }).addTo(map);

      // Marker using single-quoted inner HTML to avoid quote collision
      var markerHtml = '<div style="width:32px;height:32px;background:#006747;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.35);display:flex;align-items:center;justify-content:center;font-size:16px;">F</div>';
      var icon = L.divIcon({
        className: "",
        html: markerHtml,
        iconSize: [32, 32],
        iconAnchor: [16, 16]
      });

      L.marker([lat, lng], { icon: icon }).addTo(map);
      leafletRef.current = map;
    }, 120);

    return function() {
      clearTimeout(timer);
      if (leafletRef.current) {
        leafletRef.current.remove();
        leafletRef.current = null;
      }
    };
  }, [lat, lng]);

  if (!lat || !lng) return null;

  return ce("div", { style: { position: "relative", width: "100%", borderRadius: 3, overflow: "hidden", border: "1px solid " + C.cardBorder, marginTop: 12 } },
    ce("div", { ref: mapRef, style: { width: "100%", height: height + "px" } }),
    ce("div", { style: { position: "absolute", bottom: 0, left: 0, right: 0, padding: "8px 12px", background: "linear-gradient(transparent, rgba(0,0,0,0.55))", pointerEvents: "none" } },
      ce("div", { style: { fontSize: 18, fontWeight: 700, color: "#F2E8D5" } }, name)
    ),
    ce("div", { style: { position: "absolute", bottom: 4, right: 6, fontSize: 9, color: "rgba(242,232,213,0.55)", pointerEvents: "none" } }, "OSM")
  );
}

// Shows a course image (scorecard map) when available, falls back to Leaflet map
function CourseDetail(props) {
  var course  = props.course;
  var height  = props.height || 200;
  var showMap0 = React.useState(false);
  var showMap  = showMap0[0]; var setShowMap = showMap0[1];

  var hasImage = course.imageUrl && course.imageUrl.length > 0;
  var hasCoords = course.lat && course.lng;

  // If no image and no coords, show nothing
  if (!hasImage && !hasCoords) return null;

  // If has image, show it with optional map toggle
  if (hasImage) {
    return ce("div", { style: { marginTop: 12 } },
      ce("div", { style: { position: "relative", width: "100%", borderRadius: 3, overflow: "hidden", border: "1px solid " + C.cardBorder } },
        ce("img", { src: course.imageUrl, alt: course.name + " scorecard map", style: { width: "100%", height: height + "px", objectFit: "cover", display: "block" } }),
        ce("div", { style: { position: "absolute", bottom: 0, left: 0, right: 0, padding: "8px 12px", background: "linear-gradient(transparent, rgba(0,0,0,0.55))", display: "flex", justifyContent: "space-between", alignItems: "flex-end" } },
          ce("div", { style: { fontSize: 18, fontWeight: 700, color: "#F2E8D5" } }, course.name),
          hasCoords ? ce("button", {
            onClick: function() { setShowMap(function(v) { return !v; }); },
            style: { fontSize: 18, fontWeight: 700, color: "#F2E8D5", background: "rgba(0,0,0,0.35)", border: "1px solid rgba(255,255,255,0.3)", borderRadius: 6, padding: "3px 8px", cursor: "pointer" }
          }, showMap ? "Map" : "Map") : null
        )
      ),
      showMap && hasCoords ? ce(CourseMap, { lat: course.lat, lng: course.lng, name: course.name, height: 160 }) : null
    );
  }

  // No image - just the Leaflet map
  return ce(CourseMap, { lat: course.lat, lng: course.lng, name: course.name, height: height });
}

// ---- COURSE SEARCH ----------------------------------------------------------
function CourseSearch(props) {
  var onSelect = props.onSelect;
  var onCancel = props.onCancel;

  var qs = useState(""); var query = qs[0]; var setQuery = qs[1];
  var rs = useState([]); var results = rs[0]; var setResults = rs[1];
  var ls = useState(false); var loading = ls[0]; var setLoading = ls[1];
  var es = useState(""); var error = es[0]; var setError = es[1];
  var ss = useState(false); var hasSearched = ss[0]; var setHasSearched = ss[1];
  var ms = useState(null); var previewMap = ms[0]; var setPreviewMap = ms[1];
  var ld0 = useState(null); var loadingDetailId = ld0[0]; var setLoadingDetailId = ld0[1];

  function extractPars(tees) {
    // Prefer male tees, fall back to female. Pick first tee with full hole data.
    var groups = [];
    if (tees && tees.male && tees.male.length) groups = tees.male;
    else if (tees && tees.female && tees.female.length) groups = tees.female;
    for (var t = 0; t < groups.length; t++) {
      var holes = groups[t].holes;
      if (holes && holes.length >= 9) {
        var pars = holes.map(function(h) { return parseInt(h.par, 10) || 4; });
        if (pars.every(function(p) { return p >= 3 && p <= 5; })) return pars;
      }
    }
    return null;
  }

  function mapAPIResult(c) {
    var loc  = c.location || {};
    // Address: prefer full address string, fall back to city+state
    var addr = loc.address || [loc.city, loc.state].filter(Boolean).join(", ");
    // Extract pars from tees included in search response
    var pars = extractPars(c.tees);
    // Get hole count from tee data
    var holes = 18;
    var teeArr = (c.tees && c.tees.male && c.tees.male.length) ? c.tees.male :
                 (c.tees && c.tees.female && c.tees.female.length) ? c.tees.female : [];
    if (teeArr.length && teeArr[0].number_of_holes) holes = teeArr[0].number_of_holes;
    else if (pars) holes = pars.length;
    return {
      apiId:   c.id,
      name:    c.club_name || c.course_name || "Unknown",
      address: addr,
      lat:     parseFloat(loc.latitude)  || null,
      lng:     parseFloat(loc.longitude) || null,
      holes:   holes,
      pars:    pars,
      par:     pars ? pars.reduce(function(a, b) { return a + b; }, 0) : null,
      fromAPI: true,
      hasPars: !!pars
    };
  }

  function doSearch() {
    var q = query.trim();
    if (!q) return;
    setLoading(true); setError(""); setResults([]); setHasSearched(true);

    fetch(GOLF_API_BASE + "/search?search_query=" + encodeURIComponent(q),
      { headers: { "Authorization": "Key " + GOLF_API_KEY } })
      .then(function(res) {
        if (!res.ok) throw new Error("API error " + res.status);
        return res.json();
      })
      .then(function(data) {
        setLoading(false);
        var courses = (data.courses || []).slice(0, 8);
        if (courses.length === 0) {
          setHasSearched(true);
          setResults([]);
          return;
        }
        setResults(courses.map(mapAPIResult));
      })
      .catch(function(err) {
        // Fall back to OSM if API fails
        var url = "https://nominatim.openstreetmap.org/search"
          + "?q=" + encodeURIComponent(q + " golf course")
          + "&format=json&limit=8&addressdetails=1&extratags=1&countrycodes=us";
        fetch(url, { headers: { "Accept-Language": "en" } })
          .then(function(res) { return res.json(); })
          .then(function(data) {
            setLoading(false);
            var filtered = data.filter(function(item) {
              var name = (item.display_name || "").toLowerCase();
              return name.indexOf("golf") !== -1 || (item.type || "") === "golf_course";
            });
            if (!filtered.length && data.length) filtered = data.slice(0, 5);
            setResults(filtered.map(function(item) {
              var addr = item.address || {};
              var parts = [];
              if (addr.road) parts.push(addr.road);
              if (addr.city || addr.town) parts.push(addr.city || addr.town);
              if (addr.state) parts.push(addr.state);
              return {
                apiId:   null,
                name:    item.name || item.display_name.split(",")[0],
                address: parts.join(", ") || item.display_name.split(",").slice(0,2).join(","),
                lat:     parseFloat(item.lat) || null,
                lng:     parseFloat(item.lon) || null,
                holes:   18, pars: null, par: null, fromAPI: false, hasPars: false
              };
            }));
          })
          .catch(function() { setLoading(false); setError("Search failed. Check your connection."); });
      });
  }

  // Fetch full course detail (pars) when user taps a result
  function fetchAndSelect(result, onSelect) {

    if (!result.apiId) {
      onSelect({ name: result.name, address: result.address, lat: result.lat, lng: result.lng });
      return;
    }

    if (result.hasPars) {

        name:    result.name,
        address: result.address,
        lat:     result.lat,
        lng:     result.lng,
        pars:    result.pars,
        holes:   result.holes,
        par:     result.par,

    fetch(GOLF_API_BASE + "/courses/" + result.apiId,
      { headers: { "Authorization": "Key " + GOLF_API_KEY } })
      .then(function(res) { return res.json(); })
      .then(function(data) {
        var pars   = extractPars(data.tees);
        var teeArr = (data.tees && data.tees.male && data.tees.male.length) ? data.tees.male :
                     (data.tees && data.tees.female && data.tees.female.length) ? data.tees.female : [];
        var holes  = (teeArr.length && teeArr[0].number_of_holes) ? teeArr[0].number_of_holes :
                     (pars ? pars.length : 18);
        onSelect({
          name:    result.name,
          address: result.address,
          lat:     result.lat,
          lng:     result.lng,
          pars:    pars,
          holes:   holes,
          par:     pars ? pars.reduce(function(a, b) { return a + b; }, 0) : null,
          fromDB:  !!pars
        });
      })
      .catch(function() {
        onSelect({ name: result.name, address: result.address, lat: result.lat, lng: result.lng });
      });
  }

  function handleKey(e) { if (e.key === "Enter" || e.keyCode === 13) doSearch(); }



  return ce("div", { style: { flex: 1, display: "flex", flexDirection: "column", overflow: "hidden", background: C.bg } },
    ce("div", { style: { background: C.header, paddingTop: "calc(20px + var(--sat))", paddingRight: "24px", paddingBottom: "18px", paddingLeft: "24px" } },
      ce("button", { onClick: onCancel, style: { background: "none", border: "none", color: "rgba(242,232,213,0.7)", fontSize: 17, cursor: "pointer", padding: "0 0 10px", display: "block" } }, "< Back"),
      ce("div", { style: { fontSize: 18, color: MYB, letterSpacing: "0.12em", textTransform: "uppercase", fontWeight: 700, marginBottom: 4 } }, "Find a Course"),
      ce("div", { style: { fontSize: 28, fontWeight: 900, color: "#F2E8D5", marginBottom: 14 } }, "Search Courses"),
      ce("div", { style: { display: "flex", gap: 8 } },

// ---- STABLEFORD TRACKER -----------------------------------------------------
function StablefordTracker(props) {
  var course     = props.course;
  var onComplete = props.onComplete;
  var onExit     = props.onExit;

  var activePars = course.pars.slice(0, course.holes);
  var sc0 = useState(activePars.map(function(p) { return { score: p, putts: 2 }; }));
  var scores = sc0[0]; var setScores = sc0[1];
  var h0 = useState(0);
  var currentHole = h0[0]; var setCurrentHole = h0[1];

  function stablefordPts(score, par) {
    var d = score - par;
    if (d <= -2) return 4;
    if (d === -1) return 3;
    if (d === 0)  return 2;
    if (d === 1)  return 1;
    return 0;
  }

  var currentPar   = activePars[currentHole];
  var currentScore = scores[currentHole].score;
  var totalPts     = scores.reduce(function(a, s, i) { return a + stablefordPts(s.score, activePars[i]); }, 0);
  var curPts       = stablefordPts(currentScore, currentPar);
  var diff         = currentScore - currentPar;
  var ptColor      = diff <= -2 ? "#2A4A2A" : diff === -1 ? MG : diff === 0 ? "#4A8C6E" : diff === 1 ? PC : RED;
  var ptBg         = diff <= -2 ? "#D8EAD8" : diff === -1 ? "#EDE4D0" : diff === 0 ? "#EDE4D0" : diff === 1 ? "#FFF0EB" : "#FFEBEB";
  var ptLabel      = curPts === 4 ? "Eagle" : curPts === 3 ? "Birdie" : curPts === 2 ? "Par" : curPts === 1 ? "Bogey" : "No pts";

  function updateScore(delta) {
    setScores(function(prev) {
      var n = prev.map(function(h) { return Object.assign({}, h); });
      n[currentHole].score = Math.max(1, Math.min(10, n[currentHole].score + delta));
      return n;
    });
  }

  function setQuick(val) {
    setScores(function(prev) {
      var n = prev.map(function(h) { return Object.assign({}, h); });
      if (val >= 1 && val <= 10) n[currentHole].score = val;
      return n;
    });
  }

  return ce("div", { style: { flex: 1, display: "flex", flexDirection: "column", background: C.bg } },
    ce("div", { style: { background: C.header, paddingTop: "calc(16px + var(--sat))", paddingRight: "24px", paddingBottom: "14px", paddingLeft: "24px", flexShrink: 0 } },
      ce("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 12 } },
        ce("div", null,
          ce("div", { style: { fontSize: 18, color: MYB, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.1em" } }, course.name),
          ce("div", { style: { fontSize: 18, color: "rgba(242,232,213,0.6)", marginTop: 2 } }, "Stableford"),
          ce("div", { style: { fontSize: 28, fontWeight: 900, color: "#F2E8D5", marginTop: 4 } },
            "Hole " + (currentHole + 1),
            ce("span", { style: { fontSize: 17, color: "rgba(242,232,213,0.5)", fontWeight: 400, marginLeft: 8 } }, "of " + course.holes)
          )
        ),
        ce("div", { style: { textAlign: "right" } },
          ce("div", { style: { fontSize: 18, color: "rgba(242,232,213,0.6)" } }, "Total Points"),
          ce("div", { style: { fontSize: 32, fontWeight: 900, color: MYB } }, totalPts),
          ce("button", { onClick: onExit, style: { fontSize: 18, color: "rgba(242,232,213,0.4)", background: "none", border: "none", cursor: "pointer", display: "block", marginTop: 4 } }, "Exit")
        )
      ),
      ce("div", { style: { overflowX: "auto", display: "flex", gap: 5 } },
        activePars.map(function(_, i) {
          var isActive = i === currentHole;
          var pts = stablefordPts(scores[i].score, activePars[i]);
          var ptc = pts === 4 ? "#2A4A2A" : pts === 3 ? MG : pts === 2 ? "#4A8C6E" : pts === 1 ? PC : RED;
          return ce("div", { key: i, onClick: function() { setCurrentHole(i); },
            style: { flexShrink: 0, width: 32, height: 42, borderRadius: 7, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", cursor: "pointer", border: "2px solid " + (isActive ? MYB : "transparent"), background: "rgba(242,232,213,0.08)", gap: 1 }
          },
            ce("div", { style: { fontSize: 8, color: isActive ? MYB : "rgba(255,255,255,0.4)" } }, i + 1),
            ce("div", { style: { fontSize: 17, fontWeight: 800, color: isActive ? MYB : ptc } }, pts + "pt")
          );
        })
      )
    ),
    ce("div", { style: { flex: 1, overflowY: "auto", padding: "20px 24px 12px" } },
      ce("div", { style: { textAlign: "center", marginBottom: 20 } },
        ce("div", { style: { fontSize: 18, color: C.muted, fontWeight: 600, marginBottom: 4 } }, "PAR " + currentPar),
        ce("div", { style: { fontSize: 108, fontWeight: 900, color: ptColor, lineHeight: 1, marginBottom: 8 } }, currentScore),
        ce("div", { style: { display: "flex", alignItems: "center", justifyContent: "center", gap: 10, marginBottom: 18 } },
          ce("div", { style: { background: ptColor, color: "#F2E8D5", borderRadius: 4, padding: "4px 14px", fontSize: 17, fontWeight: 800 } }, ptLabel),
          ce("div", { style: { background: ptBg, color: ptColor, borderRadius: 4, padding: "4px 12px", fontSize: 17, fontWeight: 800, border: "1px solid " + ptColor + "33" } }, curPts + " pt" + (curPts !== 1 ? "s" : ""))
        ),
        ce("div", { style: { display: "flex", alignItems: "center", justifyContent: "center", gap: 32 } },
          ce("button", { onClick: function() { updateScore(-1); }, style: { width: 72, height: 72, borderRadius: 22, fontSize: 36, fontWeight: 700, background: C.card, border: "2px solid " + C.border, color: C.text } }, "-"),
          ce("button", { onClick: function() { updateScore(1); }, style: { width: 72, height: 72, borderRadius: 22, fontSize: 36, fontWeight: 700, background: MG, border: "none", color: "#F2E8D5" } }, "+")
        )
      ),
      ce("div", { style: { display: "flex", gap: 8 } },
        [[-1,"Birdie"],[0,"Par"],[1,"Bogey"],[2,"Dbl"]].map(function(pair) {
          var val = currentPar + pair[0];
          var active = currentScore === val;
          var tc = holeColor(val, currentPar);
          return ce("button", { key: pair[1], onClick: function() { setQuick(val); },
            style: { flex: 1, padding: "10px 2px", borderRadius: 10, cursor: "pointer", fontSize: 17, fontWeight: 700, border: "2px solid " + (active ? tc : C.cardBorder), background: active ? tc + "22" : C.card, color: active ? tc : C.muted }
          }, pair[1]);
        })
      )
    ),
    ce("div", { style: { paddingTop: "0", paddingRight: "20px", paddingBottom: "calc(0px + var(--sab))", paddingLeft: "20px", display: "flex", gap: 6, background: C.bg, borderTop: "2px solid " + C.border, flexShrink: 0 } },
      currentHole > 0 ? ce("button", { onClick: function() { setCurrentHole(function(h) { return h - 1; }); }, style: { flex: 1, padding: "14px", borderRadius: "3px 3px 0 0", background: C.card, border: "1px solid " + C.border, borderBottom: "2px solid " + C.border, color: C.muted, fontSize: 15, fontWeight: 700 } }, "< Back") : null,
      currentHole < course.holes - 1
        ? ce("button", { onClick: function() { setCurrentHole(function(h) { return h + 1; }); }, style: { flex: 2, padding: "14px", borderRadius: "3px 3px 0 0", background: MG, border: "1px solid " + C.border, borderBottom: "2px solid " + MY, color: "#F2E8D5", fontWeight: 600, fontSize: 15 } }, "Next Hole >")
        : ce("button", { onClick: function() { onComplete({ type: "stableford", totalPts: totalPts, scores: scores, pars: activePars, courseName: course.name, holes: course.holes, date: new Date().toLocaleDateString() }); }, style: { flex: 2, padding: "14px", borderRadius: "3px 3px 0 0", background: "linear-gradient(180deg,#D4AE50,#B8922A)", border: "1px solid #8A6A18", borderBottom: "2px solid #7A5A10", color: "#1C1409", fontWeight: 700, fontSize: 15, boxShadow: "inset 0 1px 0 rgba(255,255,255,0.25)" } }, "Finish  " + totalPts + " pts")
    )
  );
}

function SkinsTracker(props) {
  var course     = props.course;
  var players    = props.players;
  var onComplete = props.onComplete;
  var onExit     = props.onExit;

  var activePars = course.pars.slice(0, course.holes);
  var np = players.length;

  var sc0 = useState(activePars.map(function(p) { return players.map(function() { return p; }); }));
  var scores = sc0[0]; var setScores = sc0[1];
  var h0 = useState(0);
  var currentHole = h0[0]; var setCurrentHole = h0[1];

  function updateScore(pi, delta) {
    setScores(function(prev) {
      var n = prev.map(function(row) { return row.slice(); });
      n[currentHole][pi] = Math.max(1, Math.min(12, n[currentHole][pi] + delta));
      return n;
    });
  }

  // Calculate skins with carryover
  var playerSkins = players.map(function() { return 0; });
  var pot = 0;
  var skinResults = activePars.map(function(_, i) {
    pot++;
    var hScores = scores[i];
    var minScore = Math.min.apply(null, hScores);
    var winners = [];
    hScores.forEach(function(s, pi) { if (s === minScore) winners.push(pi); });
    if (winners.length === 1) {
      playerSkins[winners[0]] += pot;
      var w = winners[0]; var p = pot; pot = 0;
      return { winner: w, pot: p, tied: false };
    }
    return { winner: null, pot: pot, tied: true };
  });

  var par = activePars[currentHole];
  var carryPot = skinResults[currentHole] ? skinResults[currentHole].pot : pot;

        ),
        ce("button", { onClick: onExit, style: { fontSize: 18, color: "rgba(242,232,213,0.4)", background: "none", border: "none", cursor: "pointer" } }, "Exit")
      ),
      ce("div", { style: { display: "flex", gap: 6 } },
        players.map(function(name, pi) {
          return ce("div", { key: pi, style: { flex: 1, background: "rgba(242,232,213,0.12)", borderRadius: 9, padding: "8px 6px", textAlign: "center" } },
            ce("div", { style: { fontSize: 18, fontWeight: 700, color: "rgba(255,255,255,0.75)" } }, name.split(" ")[0]),
            ce("div", { style: { fontSize: 20, fontWeight: 900, color: playerSkins[pi] > 0 ? MYB : "rgba(255,255,255,0.4)" } }, playerSkins[pi])
          );
        })
      )
    ),
    ce("div", { style: { flex: 1, overflowY: "auto", padding: "14px 20px 12px" } },
      ce("div", { style: { display: "flex", flexDirection: "column", gap: 8, marginBottom: 16 } },
        players.map(function(name, pi) {
          var s = scores[currentHole][pi];
          var d = s - par;
          var sc = d < 0 ? "#2A4A2A" : d === 0 ? MG : d <= 2 ? PC : RED;
          return ce("div", { key: pi, style: { background: C.card, borderRadius: 4, border: "1.5px solid " + C.cardBorder, padding: "14px 16px", display: "flex", alignItems: "center", gap: 14 } },
            ce("div", { style: { flex: 1 } },
              ce("div", { style: { fontSize: 18, fontWeight: 700, color: C.text } }, name),
              ce("div", { style: { fontSize: 17, color: sc, marginTop: 2, fontWeight: 600 } }, d === 0 ? "Par" : d < 0 ? (d === -1 ? "Birdie" : "Eagle") : d === 1 ? "Bogey" : "+" + d)
            ),
            ce("div", { style: { display: "flex", alignItems: "center", gap: 12 } },
              ce("button", { onClick: function() { updateScore(pi, -1); }, style: { width: 38, height: 38, borderRadius: 10, background: C.btnBg, border: "1px solid " + C.btnBorder, color: C.text, fontSize: 20, fontWeight: 700 } }, "-"),
              ce("div", { style: { fontSize: 28, fontWeight: 900, color: sc, minWidth: 30, textAlign: "center" } }, s),
              ce("button", { onClick: function() { updateScore(pi, 1); }, style: { width: 38, height: 38, borderRadius: 10, background: MG, border: "none", color: "#F2E8D5", fontSize: 20, fontWeight: 700 } }, "+")
            )

        ce("div", { style: { display: "flex", padding: "7px 12px", background: C.bgAlt, borderBottom: "1px solid " + C.cardBorder } },
          ce("div", { style: { width: 24, fontSize: 9, color: C.muted, textTransform: "uppercase", fontWeight: 600 } }, "H"),
          players.map(function(n, pi) { return ce("div", { key: pi, style: { flex: 1, textAlign: "center", fontSize: 9, color: C.muted, textTransform: "uppercase", fontWeight: 600, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" } }, n.split(" ")[0]); }),

// ---- WOLF TRACKER -----------------------------------------------------------
function WolfTracker(props) {
  var course     = props.course;
  var players    = props.players;
  var onComplete = props.onComplete;
  var onExit     = props.onExit;

  var activePars = course.pars.slice(0, course.holes);
  var np = players.length;

  var hs0 = useState(activePars.map(function(p) {
    return { partner: null, goSolo: false, scored: false, scores: players.map(function() { return p; }) };
  }));
  var holeStates = hs0[0]; var setHoleStates = hs0[1];
  var h0 = useState(0);
  var currentHole = h0[0]; var setCurrentHole = h0[1];
  var pts0 = useState(players.map(function() { return 0; }));
  var pts = pts0[0]; var setPts = pts0[1];

  var wolfIdx = currentHole % np;
  var hState  = holeStates[currentHole];
  var par     = activePars[currentHole];
  var decided = hState.partner !== null || hState.goSolo;

  function updateScore(pi, delta) {
    setHoleStates(function(prev) {
      var n = prev.map(function(h) { return Object.assign({}, h, { scores: h.scores.slice() }); });
      n[currentHole].scores[pi] = Math.max(1, Math.min(12, n[currentHole].scores[pi] + delta));
      return n;
    });
  }

  function setPartner(pi) {
    setHoleStates(function(prev) {
      var n = prev.map(function(h) { return Object.assign({}, h); });
      n[currentHole].partner = pi;
      n[currentHole].goSolo = false;
      return n;
    });
  }

  function setSolo() {
    setHoleStates(function(prev) {
      var n = prev.map(function(h) { return Object.assign({}, h); });
      n[currentHole].goSolo = true;
      n[currentHole].partner = null;
      return n;
    });
  }

  function scoreAndAdvance() {
    var hs = holeStates[currentHole];
    var hScores = hs.scores;
    var newPts = pts.slice();

    if (hs.goSolo) {
      var wolfScore = hScores[wolfIdx];
      var others = [];
      players.forEach(function(_, pi) { if (pi !== wolfIdx) others.push(pi); });
      var wolfWins = others.every(function(pi) { return wolfScore < hScores[pi]; });
      if (wolfWins) { newPts[wolfIdx] += np; }
      else { others.forEach(function(pi) { newPts[pi] += 2; }); }
    } else if (hs.partner !== null) {
      var partner = hs.partner;
      var ourBest = Math.min(hScores[wolfIdx], hScores[partner]);
      var theirScores = [];
      players.forEach(function(_, pi) { if (pi !== wolfIdx && pi !== partner) theirScores.push(hScores[pi]); });
      var theirBest = Math.min.apply(null, theirScores);
      if (ourBest < theirBest) { newPts[wolfIdx] += 2; newPts[partner] += 2; }
      else { players.forEach(function(_, pi) { if (pi !== wolfIdx && pi !== partner) newPts[pi] += 2; }); }
    }

    setHoleStates(function(prev) {
      var n = prev.map(function(h) { return Object.assign({}, h); });
      n[currentHole].scored = true;
      return n;
    });
    setPts(newPts);

    if (currentHole < course.holes - 1) { setCurrentHole(currentHole + 1); }
    else { onComplete({ type: "wolf", pts: newPts, players: players, courseName: course.name, date: new Date().toLocaleDateString() }); }
  }

  return ce("div", { style: { flex: 1, display: "flex", flexDirection: "column", background: C.bg } },
    ce("div", { style: { background: C.header, paddingTop: "calc(16px + var(--sat))", paddingRight: "24px", paddingBottom: "14px", paddingLeft: "24px", flexShrink: 0 } },
      ce("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 } },
        ce("div", null,
          ce("div", { style: { fontSize: 18, color: MYB, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.1em" } }, course.name),
          ce("div", { style: { fontSize: 18, color: "rgba(242,232,213,0.6)", marginTop: 2 } }, "Wolf  -  Hole " + (currentHole + 1) + " of " + course.holes),
          ce("div", { style: { fontSize: 20, fontWeight: 900, color: MYB, marginTop: 6 } }, players[wolfIdx] + " is the Wolf")
        ),
        ce("button", { onClick: onExit, style: { fontSize: 18, color: "rgba(242,232,213,0.4)", background: "none", border: "none", cursor: "pointer" } }, "Exit")
      ),
      ce("div", { style: { display: "flex", gap: 5 } },
        players.map(function(name, pi) {
          var isWolf = pi === wolfIdx;
          return ce("div", { key: pi, style: { flex: 1, background: isWolf ? MYB : "rgba(255,255,255,0.1)", borderRadius: 2, padding: "7px 4px", textAlign: "center" } },
            ce("div", { style: { fontSize: 9, fontWeight: 800, color: isWolf ? "#000" : "rgba(255,255,255,0.6)", textTransform: "uppercase" } }, isWolf ? "Wolf" : name.split(" ")[0]),
            ce("div", { style: { fontSize: 18, fontWeight: 900, color: isWolf ? "#000" : MYB } }, pts[pi])
          );
        })
      )
    ),
    ce("div", { style: { flex: 1, overflowY: "auto", padding: "16px 20px 12px" } },
      // Step 1: choose partner or go solo
      !decided ? ce("div", { style: { marginBottom: 16 } },
        ce("div", { style: { fontSize: 18, color: "rgba(242,232,213,0.65)", fontWeight: 600, marginBottom: 12 } }, "Wolf chooses after seeing tee shots:"),
        ce("div", { style: { display: "flex", flexDirection: "column", gap: 8 } },
          players.map(function(name, pi) {
            if (pi === wolfIdx) return null;
            return ce("button", { key: pi, onClick: function() { setPartner(pi); },
              style: { width: "100%", padding: "15px 18px", borderRadius: 4, background: "#EDE4D0", border: "2px solid " + MG + "44", color: MG, fontSize: 17, fontWeight: 800, textAlign: "left", cursor: "pointer" }
            }, "Partner with " + name);
          }),
          ce("button", { onClick: setSolo,
            style: { width: "100%", padding: "15px 18px", borderRadius: 4, background: "#FFF0EB", border: "2px solid " + PC + "44", color: PC, fontSize: 17, fontWeight: 800, cursor: "pointer" }
          }, "Go Solo  (2x points if Wolf wins)")
        )
      ) : null,
      // Step 2: enter scores
      decided ? ce("div", null,
        ce("div", { style: { background: hState.goSolo ? "#FFF0EB" : "#EDE4D0", borderRadius: 3, padding: "10px 14px", marginBottom: 12, border: "1.5px solid " + (hState.goSolo ? PC + "55" : MG + "55") } },
          ce("div", { style: { fontSize: 17, fontWeight: 700, color: hState.goSolo ? PC : MG } },
            hState.goSolo
              ? players[wolfIdx] + " going SOLO  vs all"
              : players[wolfIdx] + " + " + players[hState.partner] + "  vs the field"
          ),
          ce("div", { style: { fontSize: 18, color: C.muted, marginTop: 3 } }, "Par " + par + "  -  Enter all scores then tap Score Hole")
        ),
        ce("div", { style: { display: "flex", flexDirection: "column", gap: 8 } },
          players.map(function(name, pi) {
            var s = hState.scores[pi];
            var d = s - par;
            var sc = d < 0 ? "#2A4A2A" : d === 0 ? MG : d <= 2 ? PC : RED;
            var isWolf    = pi === wolfIdx;
            var isPartner = hState.partner === pi;
            return ce("div", { key: pi, style: { background: C.card, borderRadius: 3, border: "2px solid " + ((isWolf || isPartner) ? MG + "55" : C.cardBorder), padding: "12px 16px", display: "flex", alignItems: "center", gap: 12 } },
              ce("div", { style: { flex: 1 } },
                ce("div", { style: { fontSize: 17, fontWeight: 700, color: C.text } }, name),
                ce("div", { style: { fontSize: 18, color: isWolf ? MYB : isPartner ? MG : C.muted, fontWeight: 700, textTransform: "uppercase", marginTop: 2 } }, isWolf ? "Wolf" : isPartner ? "Partner" : "")
              ),
              ce("div", { style: { display: "flex", alignItems: "center", gap: 12 } },
                ce("button", { onClick: function() { updateScore(pi, -1); }, style: { width: 36, height: 36, borderRadius: 9, background: C.btnBg, border: "1px solid " + C.btnBorder, color: C.text, fontSize: 20, fontWeight: 700 } }, "-"),
                ce("div", { style: { fontSize: 28, fontWeight: 900, color: sc, minWidth: 28, textAlign: "center" } }, s),
                ce("button", { onClick: function() { updateScore(pi, 1); }, style: { width: 36, height: 36, borderRadius: 9, background: MG, border: "none", color: "#F2E8D5", fontSize: 20, fontWeight: 700 } }, "+")
              )
            );
          })
        )
      ) : null
    ),
    ce("div", { style: { paddingTop: "0", paddingRight: "20px", paddingBottom: "calc(0px + var(--sab))", paddingLeft: "20px", display: "flex", gap: 6, background: C.bg, borderTop: "2px solid " + C.border, flexShrink: 0 } },
      currentHole > 0 ? ce("button", { onClick: function() { setCurrentHole(function(h) { return h - 1; }); }, style: { flex: 1, padding: "14px", borderRadius: "3px 3px 0 0", background: C.card, border: "1px solid " + C.border, borderBottom: "2px solid " + C.border, color: C.muted, fontSize: 15, fontWeight: 700 } }, "< Back") : null,
      decided ? ce("button", { onClick: scoreAndAdvance,
        style: { flex: 2, padding: "15px", borderRadius: 3, background: currentHole < course.holes - 1 ? MG : MY, border: "none", color: currentHole < course.holes - 1 ? "#fff" : "#000", fontWeight: 800, fontSize: 15 }
      }, currentHole < course.holes - 1 ? "Score Hole >" : "Final Results") : null
    )
  );
}

// ---- HANDICAP CALCULATOR (pulls from round history) -------------------------
function HandicapCalc(props) {
  var onClose = props.onClose;
  var history = props.history || [];

  var excl0 = useState({});
  var excluded = excl0[0]; var setExcluded = excl0[1];

  var allDiffs = history.slice(0, 20).map(function(r) {
    return {
      courseName: r.courseName || "Round",
      date:       r.date || "",
      score:      r.totalScore,
      par:        r.totalPar,
      holes:      r.holes || 18,
      diff:       r.holes === 9 ? (r.totalScore - r.totalPar) * 2 : (r.totalScore - r.totalPar)
    };
  });

  function toggleExclude(i) {
    setExcluded(function(prev) {
      var n = Object.assign({}, prev);
      if (n[i]) delete n[i]; else n[i] = true;
      return n;
    });
  }

  var includedDiffs = allDiffs.filter(function(_, i) { return !excluded[i]; }).map(function(r) { return r.diff; });

  function getBestCount(n) {
    if (n >= 20) return 8; if (n >= 17) return 7; if (n >= 14) return 6;
    if (n >= 11) return 5; if (n >= 9)  return 4; if (n >= 7)  return 3;
    if (n >= 5)  return 2; return 1;
  }

  var handicapIndex = null;
  if (includedDiffs.length >= 3) {
    var sorted = includedDiffs.slice().sort(function(a, b) { return a - b; });
    var useCount = getBestCount(sorted.length);
    var best = sorted.slice(0, useCount);
    var avg = best.reduce(function(a, b) { return a + b; }, 0) / best.length;
    handicapIndex = Math.round(avg * 10) / 10;
  }

  return ce("div", { style: { position: "fixed", inset: 0, background: C.bg, zIndex: 300, display: "flex", flexDirection: "column", maxWidth: 430, margin: "0 auto" } },
    ce("div", { style: { background: C.header, paddingTop: "calc(20px + var(--sat))", paddingRight: "24px", paddingBottom: "18px", paddingLeft: "24px", flexShrink: 0 } },
      ce("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "flex-start" } },
        ce("div", null,
          ce("div", { style: { fontSize: 18, color: MYB, textTransform: "uppercase", letterSpacing: "0.12em", fontWeight: 700, marginBottom: 4 } }, "Optional"),
          ce("div", { style: { fontSize: 28, fontWeight: 900, color: "#F2E8D5" } }, "Handicap Index")
        ),
        ce("button", { onClick: onClose, style: { width: 36, height: 36, borderRadius: 10, background: "rgba(242,232,213,0.15)", border: "none", color: "#F2E8D5", fontSize: 18, cursor: "pointer" } }, "X")
      ),
      handicapIndex !== null ? ce("div", { style: { marginTop: 14, background: "rgba(242,232,213,0.12)", borderRadius: 3, padding: "12px 18px", display: "flex", alignItems: "center", justifyContent: "space-between" } },
        ce("div", null,
          ce("div", { style: { fontSize: 18, color: "rgba(255,255,255,0.75)", fontWeight: 600 } }, "Handicap Index"),
          ce("div", { style: { fontSize: 18, color: "rgba(242,232,213,0.45)", marginTop: 3 } }, "Best " + getBestCount(includedDiffs.length) + " of " + includedDiffs.length + " rounds  (USGA method)")
        ),
        ce("div", { style: { fontSize: 52, fontWeight: 900, color: MYB } }, handicapIndex > 0 ? "+" + handicapIndex : "" + handicapIndex)
      ) : history.length === 0 ? null :
        ce("div", { style: { marginTop: 12, background: "rgba(242,232,213,0.1)", borderRadius: 10, padding: "10px 14px", fontSize: 18, color: "rgba(242,232,213,0.6)" } }, "Play at least 3 rounds to calculate.")
    ),
    ce("div", { style: { flex: 1, overflowY: "auto", padding: "16px 20px 40px" } },
      history.length === 0 ?
        ce("div", { style: { textAlign: "center", padding: "40px 20px" } },
          ce("div", { style: { fontSize: 18, fontWeight: 700, color: C.text, marginBottom: 10 } }, "No rounds logged yet"),
          ce("div", { style: { fontSize: 18, color: C.muted, lineHeight: 1.7 } }, "Save rounds after playing and they will appear here automatically. Your last 20 rounds feed the calculation.")
        ) :
        ce("div", null,
          ce("div", { style: { fontSize: 17, color: C.muted, marginBottom: 14, lineHeight: 1.6 } }, "Tap a row to exclude it from the calculation. 9-hole rounds are doubled."),
          ce("div", { style: { background: C.card, borderRadius: 3, border: "1px solid " + C.cardBorder, overflow: "hidden", boxShadow: "0 1px 3px rgba(28,20,9,0.06),inset 0 1px 0 rgba(255,255,255,0.5)", marginBottom: 16 } },
            ce("div", { style: { display: "flex", padding: "8px 14px", background: C.bgAlt, borderBottom: "1px solid " + C.cardBorder } },
              ce("div", { style: { flex: 1, fontSize: 18, color: C.muted, textTransform: "uppercase", fontWeight: 600 } }, "Round"),
              ce("div", { style: { width: 50, textAlign: "center", fontSize: 18, color: C.muted, textTransform: "uppercase", fontWeight: 600 } }, "Score"),
              ce("div", { style: { width: 42, textAlign: "center", fontSize: 18, color: C.muted, textTransform: "uppercase", fontWeight: 600 } }, "Par"),
              ce("div", { style: { width: 48, textAlign: "center", fontSize: 18, color: C.muted, textTransform: "uppercase", fontWeight: 600 } }, "Diff")
            ),
            allDiffs.map(function(r, i) {
              var isExcl = !!excluded[i];
              var d = r.diff;
              var dc = d < 0 ? "#2A4A2A" : d === 0 ? MG : d <= 5 ? PC : RED;
              return ce("div", { key: i, onClick: function() { toggleExclude(i); },
                style: { display: "flex", alignItems: "center", padding: "9px 14px", borderBottom: i < allDiffs.length - 1 ? "1px solid " + C.cardBorder : "none", background: isExcl ? "#FFF5F5" : i % 2 === 0 ? "transparent" : C.bgAlt + "66", cursor: "pointer", opacity: isExcl ? 0.45 : 1 }
              },
                ce("div", { style: { flex: 1, minWidth: 0 } },
                  ce("div", { style: { fontSize: 18, fontWeight: 600, color: C.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", textDecoration: isExcl ? "line-through" : "none" } }, r.courseName),
                  ce("div", { style: { fontSize: 18, color: C.mutedLight, marginTop: 1 } }, r.date + (r.holes === 9 ? "  9H" : ""))
                ),
                ce("div", { style: { width: 50, textAlign: "center", fontSize: 17, fontWeight: 700, color: C.text } }, r.score),
                ce("div", { style: { width: 42, textAlign: "center", fontSize: 18, color: C.muted } }, r.par),
                ce("div", { style: { width: 48, textAlign: "center", fontSize: 17, fontWeight: 800, color: isExcl ? C.muted : dc } }, d > 0 ? "+" + d : "" + d)
              );
            })
          ),
          ce("div", { style: { fontSize: 17, color: C.mutedLight, textAlign: "center", lineHeight: 1.7 } }, "For an official USGA Handicap Index, use the GHIN app.")
        )
    )
  );
}

// ---- PRE-ROUND SETUP --------------------------------------------------------
function PreRoundSetup(props) {

function AppInner() {

  })();

  var ch = useState(savedRound ? savedRound.currentHole : 0);
  var currentHole = ch[0]; var setCurrentHole = ch[1];
  var sq = useState(savedRound ? savedRound.scores : []);
  var scores = sq[0]; var setScores = sq[1];
  var ec = useState(null); var editingCourse = ec[0]; var setEditingCourse = ec[1];
  var prc = useState(null); var preRoundCourse = prc[0]; var setPreRoundCourse = prc[1];
  var gm0 = useState(savedRound ? savedRound.gameMode : "stroke"); var gameMode = gm0[0]; var setGameMode = gm0[1];
  var bsf0 = useState("NJ"); var bookingStateFilter = bsf0[0]; var setBookingStateFilter = bsf0[1];
  var shr0 = useState(null); var selectedHistoryRound = shr0[0]; var setSelectedHistoryRound = shr0[1];
  var gp0 = useState(savedRound ? savedRound.gamePlayers : []); var gamePlayers = gp0[0]; var setGamePlayers = gp0[1];
  var gt0 = useState(savedRound ? savedRound.gameTeamName : "Our Team"); var gameTeamName = gt0[0]; var setGameTeamName = gt0[1];

  var currentPar      = selectedCourse && scores.length > currentHole ? selectedCourse.pars[currentHole] : 4;
  var currentHoleData = scores.length > currentHole ? scores[currentHole] : { score: 4, putts: 2, gir: false };
  var runningDiff     = (view === "playing" && selectedCourse) ? scores.slice(0, currentHole + 1).reduce(function(a, b, i) {
    return a + (b.score - selectedCourse.pars[i]);
  }, 0) : 0;

  // Auto-save active round state on every change
  useEffect(function() {
    if ((view === "playing" || view === "gameMode") && selectedCourse) {
      saveRoundState(view, selectedCourse, scores, currentHole, gameMode, gamePlayers, gameTeamName);
    }
  }, [view, scores, currentHole, selectedCourse, gameMode]);

    function persistCourses(list) { setCourses(list); saveJSON(COURSE_KEY, list); }

  function saveRoundState(stateView, stateCourse, stateScores, stateHole, stateMode, statePlayers, stateTeam) {
    try {
      localStorage.setItem(ROUND_STATE_KEY, JSON.stringify({
        view:         stateView,
        selectedCourse: stateCourse,
        scores:       stateScores,
        currentHole:  stateHole,
        gameMode:     stateMode,
        gamePlayers:  statePlayers,
        gameTeamName: stateTeam
      }));
    } catch(e) {}
  }

  function clearRoundState() {
    try { localStorage.removeItem(ROUND_STATE_KEY); } catch(e) {}
  }

  function goToPreRound(course) {
    setPreRoundCourse(course);
    setView("preRound");
  }
  function setHomeCourseFn(course) { setHomeCourse(course); saveJSON(HOME_COURSE_KEY, course); }

  function startRound(course) {
    var initScores = course.pars.slice(0, course.holes).map(function(p) { return emptyHole(p); });
    setSelectedCourse(course);
    setScores(initScores);
    setCurrentHole(0);
    setView("playing");
    saveRoundState("playing", course, initScores, 0, "stroke", [], "Our Team");
  }

  function updateHole(key, delta) {
    setScores(function(prev) {
      var n = prev.map(function(h) { return Object.assign({}, h); });
      var cur = n[currentHole];
      if (key === "gir") { cur.gir = !cur.gir; }
      else {
        var val = cur[key] + delta;
        if (key === "score") val = Math.max(1, Math.min(10, val));
        if (key === "putts") val = Math.max(0, Math.min(10, val));
        cur[key] = val;
      }
      return n;
    });
  }

  function setQuickScore(val) {
    setScores(function(prev) {
      var n = prev.map(function(h) { return Object.assign({}, h); });
      if (val >= 1 && val <= 10) n[currentHole].score = val;
      return n;
    });
  }

  // ---- SEARCH ----
  if (showSearch) {
    return ce(CourseSearch, {
      onSelect: function(result) {
        setShowSearch(false);
        if (result.fromDB) {
          var nc = { id: "" + Date.now(), name: result.name, address: result.address, holes: result.holes, pars: result.pars, par: result.par, lat: result.lat, lng: result.lng };

  if (view === "booking") {

        ),

        // Putts
        ce("div", { style: { background: C.card, borderRadius: 4, padding: "14px 18px", border: "1px solid " + C.cardBorder, display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 } },
          ce("div", { style: { fontSize: 18, fontWeight: 700, color: C.text } }, "Putts"),
          ce("div", { style: { display: "flex", alignItems: "center", gap: 18 } },
            ce("button", { onClick: function() { updateHole("putts", -1); }, style: { width: 40, height: 40, borderRadius: 10, background: C.btnBg, border: "1.5px solid " + C.btnBorder, color: C.text, fontSize: 28, fontWeight: 700 } }, "-"),
            ce("div", { style: { fontSize: 28, fontWeight: 900, color: MG, minWidth: 32, textAlign: "center" } }, currentHoleData.putts),
            ce("button", { onClick: function() { updateHole("putts", 1); }, style: { width: 40, height: 40, borderRadius: 10, background: MG, border: "none", color: "#F2E8D5", fontSize: 28, fontWeight: 700 } }, "+")
          )
        ),

        // GIR
        ce("button", {
          onClick: function() { updateHole("gir", 0); },
          style: { width: "100%", padding: "14px 18px", borderRadius: 4, cursor: "pointer", fontSize: 18, fontWeight: 700, background: currentHoleData.gir ? "#EDE4D0" : C.card, color: currentHoleData.gir ? MG : C.muted, border: "2px solid " + (currentHoleData.gir ? MG + "66" : C.cardBorder) }
        }, currentHoleData.gir ? "Green in Regulation" : "Missed Green  (tap to mark GIR)")
      ),

      // Nav
      ce("div", { style: { paddingTop: "0", paddingRight: "20px", paddingBottom: "calc(0px + var(--sab))", paddingLeft: "20px", display: "flex", gap: 6, background: C.bg, borderTop: "2px solid " + C.border, flexShrink: 0 } },
        currentHole > 0 ? ce("button", { onClick: function() { setCurrentHole(function(h) { return h - 1; }); }, style: { flex: 1, padding: "14px", borderRadius: "3px 3px 0 0", background: C.card, border: "1px solid " + C.border, borderBottom: "2px solid " + C.border, color: C.muted, fontSize: 15, fontWeight: 700 } }, "< Back") : null,
        currentHole < selectedCourse.holes - 1
          ? ce("button", { onClick: function() { setCurrentHole(function(h) { return h + 1; }); }, style: { flex: 2, padding: "14px", borderRadius: "3px 3px 0 0", background: MG, border: "1px solid " + C.border, borderBottom: "2px solid " + MY, color: "#F2E8D5", fontWeight: 600, fontSize: 15 } }, "Next Hole >")
          : ce("button", { onClick: function() { setView("summary"); }, style: { flex: 2, padding: "14px", borderRadius: "3px 3px 0 0", background: "linear-gradient(180deg,#D4AE50,#B8922A)", border: "1px solid #8A6A18", borderBottom: "2px solid #7A5A10", color: "#1C1409", fontWeight: 700, fontSize: 15, boxShadow: "inset 0 1px 0 rgba(255,255,255,0.25)" } }, "Finish Round")
      )
    );
  }

  // ---- SUMMARY ----
  if (view === "summary" && selectedCourse) {
    var totalScore = scores.reduce(function(a, b) { return a + b.score; }, 0);
    var totalPar   = selectedCourse.pars.slice(0, selectedCourse.holes).reduce(function(a, b) { return a + b; }, 0);
    var totalPutts = scores.reduce(function(a, b) { return a + b.putts; }, 0);
    var girCount   = scores.filter(function(s) { return s.gir; }).length;
    var finalDiff  = totalScore - totalPar;
    var bigColor   = finalDiff < 0 ? "#2A4A2A" : finalDiff === 0 ? MG : finalDiff <= 5 ? PC : RED;
    var bigBg      = finalDiff < 0 ? "#D8EAD8" : finalDiff === 0 ? "#EDE4D0" : finalDiff <= 5 ? "#FFF0EB" : "#FFEBEB";
    var activePars = selectedCourse.pars.slice(0, selectedCourse.holes);
    var f9Par      = activePars.slice(0, 9).reduce(function(a, b) { return a + b; }, 0);
    var b9Par      = selectedCourse.holes === 18 ? activePars.slice(9).reduce(function(a, b) { return a + b; }, 0) : 0;
    var f9Score    = scores.slice(0, 9).reduce(function(a, b) { return a + b.score; }, 0);
    var b9Score    = selectedCourse.holes === 18 ? scores.slice(9).reduce(function(a, b) { return a + b.score; }, 0) : 0;

    return ce("div", { style: { flex: 1, display: "flex", flexDirection: "column", overflow: "hidden", background: C.bg } },
      // Green header
      ce("div", { style: { background: C.header, paddingTop: "calc(20px + var(--sat))", paddingRight: "24px", paddingBottom: "18px", paddingLeft: "24px", flexShrink: 0 } },
        ce("div", { style: { textAlign: "center" } },
          ce("div", { style: { fontSize: 18, color: MYB, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.14em", marginBottom: 6 } }, "Leaderboard Updated"),
          selectedCourse.name !== "Standard Round" ? ce("div", { style: { fontSize: 18, color: "rgba(242,232,213,0.65)", marginBottom: 4 } }, selectedCourse.name) : null,
          ce("div", { style: { fontSize: 80, fontWeight: 900, lineHeight: 1, color: "#F2E8D5" } }, diffStr(finalDiff)),
          ce("div", { style: { fontSize: 18, color: "rgba(242,232,213,0.6)", marginTop: 4 } }, totalScore + " strokes   Par " + totalPar)
        )
      ),
      // Scrollable content
      ce("div", { style: { flex: 1, overflowY: "auto", padding: "16px 20px 40px" } },
        // XP banner
        ce("div", { style: { background: "#EDE4D0", border: "1.5px solid " + MG + "44", borderRadius: 4, padding: "14px 18px", display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 } },
          ),
        // Stats row
        ce("div", { style: { display: "flex", gap: 8, marginBottom: 14 } },
          [{ l: "Putts", v: totalPutts }, { l: "Avg Putts", v: (totalPutts / selectedCourse.holes).toFixed(1) }, { l: "GIR", v: girCount + "/" + selectedCourse.holes }].map(function(item) {
            return ce("div", { key: item.l, style: { flex: 1, background: C.card, borderRadius: 3, padding: "12px 8px", border: "1px solid " + C.cardBorder, textAlign: "center" } },
              ce("div", { style: { fontSize: 18, fontWeight: 900, color: MG } }, item.v),
              ce("div", { style: { fontSize: 9, color: "rgba(242,232,213,0.55)", textTransform: "uppercase", letterSpacing: "0.08em", marginTop: 3 } }, item.l)
            );
          })
        ),
        // Front/Back
        selectedCourse.holes === 18 ? ce("div", { style: { display: "flex", gap: 8, marginBottom: 14 } },
          [["Front 9", f9Score, f9Par], ["Back 9", b9Score, b9Par]].map(function(trio) {
            var d = trio[1] - trio[2];
            var dc = d < 0 ? "#2A4A2A" : d === 0 ? MG : d <= 3 ? PC : RED;
            var dbg = d < 0 ? "#D8EAD8" : d === 0 ? "#EDE4D0" : d <= 3 ? "#FFF0EB" : "#FFEBEB";
            return ce("div", { key: trio[0], style: { flex: 1, background: C.card, borderRadius: 3, padding: "12px", border: "1px solid " + C.cardBorder, textAlign: "center" } },
              ce("div", { style: { fontSize: 18, color: "rgba(242,232,213,0.55)", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 5 } }, trio[0]),
              ce("div", { style: { fontSize: 28, fontWeight: 900, color: dc, background: dbg, borderRadius: 2, padding: "4px 0" } }, diffStr(d)),
              ce("div", { style: { fontSize: 17, color: C.muted, marginTop: 4 } }, trio[1] + " / Par " + trio[2])
            );
          })
        ) : null,
        // Scorecard table
        ce("div", { style: { background: C.card, borderRadius: 3, border: "1px solid " + C.cardBorder, overflow: "hidden", boxShadow: "0 1px 3px rgba(28,20,9,0.06),inset 0 1px 0 rgba(255,255,255,0.5)", marginBottom: 16 } },
          ce("div", { style: { display: "flex", padding: "8px 14px", borderBottom: "1px solid " + C.cardBorder, background: C.bgAlt } },
            ce("div", { style: { flex: 1, fontSize: 18, color: C.muted, textTransform: "uppercase", fontWeight: 600 } }, "Hole"),
            ce("div", { style: { width: 36, textAlign: "center", fontSize: 18, color: C.muted, textTransform: "uppercase", fontWeight: 600 } }, "Par"),
            ce("div", { style: { width: 46, textAlign: "center", fontSize: 18, color: C.muted, textTransform: "uppercase", fontWeight: 600 } }, "Score"),
            ce("div", { style: { width: 36, textAlign: "center", fontSize: 18, color: C.muted, textTransform: "uppercase", fontWeight: 600 } }, "+/-"),
            ce("div", { style: { width: 36, textAlign: "center", fontSize: 18, color: C.muted, textTransform: "uppercase", fontWeight: 600 } }, "Putts")
          ),
          scores.map(function(s, i) {
            var p = selectedCourse.pars[i];
            var d = s.score - p;
            var sc = d < 0 ? "#2A4A2A" : d === 0 ? MG : d === 1 ? PC : RED;
            var sbg = d < 0 ? "#D8EAD8" : d === 0 ? "#EDE4D0" : d === 1 ? "#FFF5F0" : "#FFEEEE";
            return ce("div", { key: i, style: { display: "flex", alignItems: "center", padding: "7px 14px", borderBottom: i < scores.length - 1 ? "1px solid " + C.cardBorder : "none", background: i % 2 === 0 ? "transparent" : C.bgAlt + "66" } },
              ce("div", { style: { flex: 1, fontSize: 18, color: C.muted, display: "flex", alignItems: "center", gap: 5 } },
                i + 1, s.gir ? ce("div", { style: { width: 5, height: 5, borderRadius: "50%", background: MG } }) : null
              ),
              ce("div", { style: { width: 36, textAlign: "center", fontSize: 18, color: C.muted } }, p),
              ce("div", { style: { width: 46, textAlign: "center", fontSize: 18, fontWeight: 800, color: sc, background: sbg, borderRadius: 6, margin: "2px 0" } }, s.score),
              ce("div", { style: { width: 36, textAlign: "center", fontSize: 18, fontWeight: 700, color: sc } }, diffStr(d)),
              ce("div", { style: { width: 36, textAlign: "center", fontSize: 18, color: C.muted } }, s.putts)
            );
          }),
          ce("div", { style: { display: "flex", alignItems: "center", padding: "10px 14px", background: C.bgAlt, borderTop: "2px solid " + C.cardBorder } },
            ce("div", { style: { flex: 1, fontSize: 17, fontWeight: 800, color: C.text } }, "Total"),
            ce("div", { style: { width: 36, textAlign: "center", fontSize: 17, fontWeight: 700, color: C.text } }, totalPar),
            ce("div", { style: { width: 46, textAlign: "center", fontSize: 18, fontWeight: 900, color: bigColor, background: bigBg, borderRadius: 7, margin: "2px 0" } }, totalScore),
            ce("div", { style: { width: 36, textAlign: "center", fontSize: 18, fontWeight: 900, color: bigColor } }, diffStr(finalDiff)),
            ce("div", { style: { width: 36, textAlign: "center", fontSize: 17, fontWeight: 700, color: MG } }, totalPutts)
          )
        ),
        ce("div", { style: { fontSize: 18, color: C.mutedLight, marginBottom: 16, textAlign: "center" } }, "Green dot in scorecard = GIR"),
        ce("button", {
          onClick: function() {
            var round = { courseId: selectedCourse.id, courseName: selectedCourse.name, holes: selectedCourse.holes, pars: selectedCourse.pars.slice(), scoreDiff: finalDiff, totalScore: totalScore, totalPar: totalPar, totalPutts: totalPutts, girCount: girCount, date: new Date().toLocaleDateString(), holeData: scores.slice() };
            clearRoundState();
            var next = [round].concat(history);
            setHistory(next); saveJSON(HISTORY_KEY, next); setView("setup");
          },
          style: { width: "100%", padding: "16px", borderRadius: 4, background: MG, border: "none", color: "#F2E8D5", fontSize: 17, fontWeight: 800 }
        }, "Save Round"),
        ce("button", { onClick: function() { setView("playing"); }, style: { width: "100%", marginTop: 10, padding: "13px", borderRadius: 4, background: "transparent", border: "1.5px solid " + C.cardBorder, color: C.muted, fontSize: 13 } }, "< Back to Scorecard")
      )
    );
  }

  // Fallback / overlay-only state
  return ce("div", { style: { flex: 1, background: C.bg } },
    showHistory ? ce(HistoryLog, { history: history, initialExpanded: selectedHistoryRound, onClose: function() { setShowHistory(false); setSelectedHistoryRound(null); } }) : null
  );
}

try {
  ReactDOM.createRoot(document.getElementById("root")).render(ce(AppInner, null));
} catch(e) {
  console.error("Mount error:", e);
  document.getElementById("fallback").style.display = "flex";
}

  </script>

</body>
</html>
